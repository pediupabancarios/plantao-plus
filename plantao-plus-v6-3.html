// ── STORAGE ───────────────────────────────────────────
async function sGet(k){try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null;}catch{return null;}}
async function sSet(k,v){try{await window.storage.set(k,JSON.stringify(v),true);}catch{}}
function useShared(key,def,ms=2500){
  const[val,sV]=useState(def);const[ok,sOk]=useState(false);const last=useRef("");
  useEffect(()=>{(async()=>{const s=await sGet(key);if(s){sV(s);last.current=JSON.stringify(s);}else{await sSet(key,def);last.current=JSON.stringify(def);}sOk(true);})();},[]);
  useEffect(()=>{if(!ok)return;const i=setInterval(async()=>{const s=await sGet(key);if(s){const str=JSON.stringify(s);if(str!==last.current){sV(s);last.current=str;}}},ms);return()=>clearInterval(i);},[ok,ms]);
  const upd=useCallback(async(nv)=>{const r=typeof nv==="function"?nv(val):nv;sV(r);last.current=JSON.stringify(r);await sSet(key,r);},[key,val]);
  return[val,upd,ok];
}

// ── GEO ───────────────────────────────────────────────
function distM(la1,lo1,la2,lo2){const R=6371000,r=x=>x*Math.PI/180;const a=Math.sin(r(la2-la1)/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(r(lo2-lo1)/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function useGeo(){
  const[g,sG]=useState({status:"idle",dist:null,ts:null});
  const check=useCallback(()=>{
    if(!navigator.geolocation){sG(x=>({...x,status:"erro"}));return;}
    sG(x=>({...x,status:"loading"}));
    navigator.geolocation.getCurrentPosition(
      p=>{const d=distM(p.coords.latitude,p.coords.longitude,HOSP.lat,HOSP.lng);sG({status:d<=RAIO?"dentro":"fora",dist:Math.round(d),acc:Math.round(p.coords.accuracy),ts:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})});},
      e=>{sG({status:e.code===1?"negado":"erro",dist:null,ts:null});},
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  },[]);
  return{geo:g,check};
}

// ── SOUND ─────────────────────────────────────────────
function playBeep(freq=523,dur=200){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;g.gain.setValueAtTime(.25,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur/1000);o.start();o.stop(ctx.currentTime+dur/1000);}catch(e){}}

// ── AUTO DARK ─────────────────────────────────────────
function useAutoDark(setDark){
  const done=useRef(false);
  useEffect(()=>{if(done.current)return;done.current=true;const h=new Date().getHours();if(h>=19||h<7)setDark(true);},[]);
}

// ── SHIFT ALERTS ──────────────────────────────────────
function useShiftAlert(user,shifts){
  const[alert,sAlert]=useState(null);const notified=useRef(new Set());
  useEffect(()=>{
    if(!user)return;
    const check=()=>{
      const now=new Date();
      const mine=Object.entries(shifts).flatMap(([d,ss])=>ss.map(s=>({...s,day:parseInt(d)}))).filter(s=>s.plantonistas.includes(user.id)&&s.status==="agendado");
      for(const s of mine){const[h,m]=s.time.split(":").map(Number);const start=new Date(2026,4,s.day,h,m,0);const diff=(start-now)/60000;const key=`${s.id}_60`;if(diff>55&&diff<=60&&!notified.current.has(key)){sAlert(s);notified.current.add(key);playBeep(523,300);setTimeout(()=>playBeep(659,300),350);setTimeout(()=>playBeep(784,400),700);}}
    };check();const i=setInterval(check,30000);return()=>clearInterval(i);
  },[user,shifts]);
  return{alert,clearAlert:()=>sAlert(null)};
}

        {[form.p1,form.p2].map(id=>{const u=allU.find(x=>x.id===parseInt(id));if(!u)return null;const{count}=calcSalary(u.id,shifts);const n=count+1,v=calcVal(n);return<div key={id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}><div style={{display:"flex",alignItems:"center",gap:7}}><Av uid={u.id} name={u.nome} size={20} ini={u.ini} color={u.color} getPhoto={getPhoto}/><span style={{fontSize:12,fontWeight:500,color:"var(--h1)"}}>{u.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" ")}</span></div><SBadge num={n}/></div>;})}
      </div>}
      <Btn onClick={addS} disabled={!form.p1||!form.p2||form.p1===form.p2}>Lançar Plantão na Escala</Btn>
    </Modal>}
    {det&&<DetModal s={det} sel={sel} user={user} isG={isG} geo={geo} check={check} shifts={shifts} users={users} onClose={()=>sDet(null)} regE={regE} regS={regS} fecharPlantao={fecharPlantao} iniciarPlantao={iniciarPlantao} delS={delS} addObs={addObs} confirmarP={confirmarP} getPhoto={getPhoto}/>}
  </div>;
}

// ── DETAIL MODAL ───────────────────────────────────────
function DetModal({s,sel,user,isG,geo,check,shifts,users,onClose,regE,regS,fecharPlantao,iniciarPlantao,delS,addObs,confirmarP,getPhoto}){

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>

            <div style={{background:s.saidas?.[p.id]?"var(--bg)":"var(--orange-bg)",borderRadius:8,padding:"5px 7px"}}><div style={{fontSize:8,fontWeight:600,color:s.saidas?.[p.id]?"var(--muted)":"var(--orange)",textTransform:"uppercase"}}>Saída</div><div style={{fontSize:10,fontWeight:700,color:s.saidas?.[p.id]?"var(--h1)":"var(--orange)"}}>{s.saidas?.[p.id]||"—"}</div></div>
          </div>
          {s.confirmados?.[p.id]&&<div style={{fontSize:9,color:"var(--teal)",marginTop:5,fontWeight:600}}>✉ Confirmou presença</div>}
        </div>
      ))}</div>
      {isG&&<div style={{marginTop:10}}>{editObs?<div style={{display:"flex",gap:7}}><textarea value={obs} onChange={e=>sObs(e.target.value)} rows={2} style={{flex:1,padding:"8px 10px",borderRadius:10,border:"1.5px solid var(--inp-b)",outline:"none",fontSize:13,fontFamily:"'Inter',sans-serif",color:"var(--h1)",background:"var(--inp)",resize:"none"}}/><button onClick={()=>{addObs(s.id,obs);sEditObs(false);}} style={{background:"var(--blue)",border:"none",borderRadius:10,padding:"8px 12px",color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",alignSelf:"flex-end"}}>✓ Salvar</button></div>:<div style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer"}} onClick={()=>sEditObs(true)}><span style={{fontSize:11,color:"var(--body)",fontStyle:s.obs?"normal":"italic"}}>{s.obs||"📝 Adicionar observação…"}</span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>}</div>}
    </div>
    {/* AÇÕES GESTOR: INICIAR / FECHAR */}
    {isG&&<div style={{marginBottom:14}}>
      <div style={{background:"var(--orange-bg)",borderRadius:12,padding:"10px 12px",marginBottom:10,border:"1px solid var(--orange)33",display:"flex",gap:8}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" strokeWidth="2" style={{flexShrink:0,marginTop:1}}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <div style={{fontSize:11,color:"#92400E",lineHeight:1.5}}><strong>Gestor:</strong> Sem restrição de localização. Pode iniciar e fechar plantões de qualquer lugar.</div>

        {s.plantonistas.filter(id=>!s.entradas?.[id]).map(id=>{const p=allU.find(u=>u.id===id);return p?<button key={id} onClick={()=>regE(s.id,id)} style={{width:"100%",padding:"10px 12px",background:"var(--blue-bg)",border:"1.5px solid var(--blue)33",borderRadius:12,color:"var(--blue)",fontSize:12,fontWeight:600,fontFamily:"inherit",cursor:"pointer",display:"flex",alignItems:"center",gap:8,marginBottom:8}}><Av uid={p.id} name={p.nome} size={22} ini={p.ini} color={p.color} getPhoto={getPhoto}/>▶ Registrar entrada · {p.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" ")}</button>:null;})}</>}
      {s.status==="em_andamento"&&<>
        {s.plantonistas.filter(id=>s.entradas?.[id]&&!s.saidas?.[id]).map(id=>{const p=allU.find(u=>u.id===id);return p?<button key={id} onClick={()=>regS(s.id,id)} style={{width:"100%",padding:"10px 12px",background:"var(--green-bg)",border:"1.5px solid var(--green)33",borderRadius:12,color:"var(--green)",fontSize:12,fontWeight:600,fontFamily:"inherit",cursor:"pointer",display:"flex",alignItems:"center",gap:8,marginBottom:8}}><Av uid={p.id} name={p.nome} size={22} ini={p.ini} color={p.color} getPhoto={getPhoto}/>✓ Registrar saída · {p.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" ")}</button>:null;})}</>}
      {!fim&&<Btn onClick={()=>fecharPlantao(s.id)} color="var(--orange)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" style={{display:"inline",marginRight:6,verticalAlign:"middle"}}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>Fechar plantão completo</Btn>}
      {isG&&<Btn onClick={()=>delS(s.id)} danger>🗑 Remover plantão</Btn>}
    </div>}
    {/* AÇÕES PLANTONISTA */}
    {!isG&&!fim&&<div style={{marginBottom:14}}>
      {!s.confirmados?.[mid]&&s.status==="agendado"&&<Btn onClick={()=>{confirmarP(s.id,mid);onClose();}} color="var(--teal)">✉ Confirmar minha presença</Btn>}
      {!jaE&&<><div style={{background:"var(--blue-bg)",borderRadius:12,padding:"10px 12px",border:"1px solid var(--blue)22",display:"flex",gap:8,marginBottom:10}}><span>📍</span><div style={{fontSize:12,color:"var(--blue)",lineHeight:1.5}}>Entrada exige estar a menos de <strong>{RAIO}m</strong> do hospital.</div></div><GeoCard geo={geo} check={check} onConfirm={geo.status==="dentro"?()=>regE(s.id,mid):null} label="▶ Registrar minha entrada"/></>}
      {jaE&&!jaS&&<><div style={{background:"var(--green-bg)",borderRadius:12,padding:"10px 12px",border:"1px solid var(--green)22",display:"flex",gap:8,marginBottom:10}}><span>📍</span><div style={{fontSize:12,color:"var(--green)",lineHeight:1.5}}>Saída exige estar dentro de <strong>{RAIO}m</strong>.</div></div><GeoCard geo={geo} check={check} onConfirm={geo.status==="dentro"?()=>regS(s.id,mid):null} label="✓ Registrar minha saída"/></>}
      {jaE&&jaS&&<div style={{textAlign:"center",padding:"14px",background:"var(--green-bg)",borderRadius:14,color:"var(--green)",fontSize:14,fontWeight:700}}>✅ Registros concluídos!</div>}
    </div>}
    {fim&&<div style={{textAlign:"center",padding:"14px",background:"var(--bg)",borderRadius:14,color:"var(--body)",fontSize:13,fontWeight:500,border:"1px solid var(--border)"}}>Plantão encerrado{s.status==="fechado_gestor"?" · pelo Dr. Rodrigo":""}</div>}
  </Modal>;

// ── TROCAS ─────────────────────────────────────────────
function Trocas({user,shifts,setShifts,trocas,setTrocas,ok,users,getPhoto}){
  const allU=users||USERS_DEFAULT;const[tab,sTab]=useState("pendentes");const[nova,sNova]=useState(false);const isG=user.role==="gestor";
  const mine=isG?trocas:(trocas||[]).filter(t=>t.dono===user.id||t.receptor===user.id);
  const pend=mine.filter(t=>t.status==="pendente"||t.status==="aguardando_gestor");
  const hist=mine.filter(t=>t.status!=="pendente"&&t.status!=="aguardando_gestor");
  const list=tab==="pendentes"?pend:hist;
  const getS=id=>Object.values(shifts).flat().find(s=>s.id===id);
  const getU2=id=>allU.find(u=>u.id===id);
  const aceitar=async(t)=>{
    const nv=JSON.parse(JSON.stringify(shifts));
    if(t.tipo==="repasse"){const s=nv[t.dayOrig]?.find(x=>x.id===t.shiftId);if(s)s.plantonistas=s.plantonistas.map(id=>id===t.dono?t.receptor:id);}
    else{const sO=nv[t.dayOrig]?.find(x=>x.id===t.shiftId),sD=nv[t.dayDest]?.find(x=>x.id===t.shiftDest);if(sO&&sD){nv[t.dayOrig]=nv[t.dayOrig].map(s=>s.id===t.shiftId?{...s,plantonistas:s.plantonistas.map(id=>id===t.dono?t.receptor:id)}:s);nv[t.dayDest]=nv[t.dayDest].map(s=>s.id===t.shiftDest?{...s,plantonistas:s.plantonistas.map(id=>id===t.receptor?t.dono:id)}:s);}}
    await setShifts(nv);await setTrocas(prev=>prev.map(x=>x.id===t.id?{...x,status:"aceita",resolvidaEm:nowFull()}:x));
  };
  const recusar=async(id)=>setTrocas(prev=>prev.map(t=>t.id===id?{...t,status:"recusada",resolvidaEm:nowFull()}:t));
  return<div style={{flex:1,overflowY:"auto",background:"var(--bg)",paddingBottom:90}}>
    <div style={{padding:"52px 18px 18px",background:"var(--grad-h)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div><div style={{fontSize:10,color:"rgba(255,255,255,.5)",fontWeight:600,textTransform:"uppercase",letterSpacing:".08em",marginBottom:3}}>Plantão+ · {isG?"Gestão":"Equipe"}</div><div style={{fontSize:20,fontWeight:700,color:"#fff",letterSpacing:"-.5px"}}>Trocas e Repasses</div><div style={{fontSize:11,color:"rgba(255,255,255,.55)",marginTop:3}}>Repasse: aprovação direta · Troca: via Dr. Rodrigo</div></div>
        <button onClick={()=>sNova(true)} style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.25)",borderRadius:12,padding:"9px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,color:"#fff",fontSize:12,fontWeight:600,fontFamily:"inherit"}}><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nova</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[{v:"pendentes",l:`⏳ Pendentes (${pend.length})`},{v:"historico",l:`📂 Histórico (${hist.length})`}].map(t=><button key={t.v} onClick={()=>sTab(t.v)} style={{padding:"9px",borderRadius:12,border:"none",background:tab===t.v?"rgba(255,255,255,.22)":"rgba(255,255,255,.07)",color:tab===t.v?"#fff":"rgba(255,255,255,.5)",fontWeight:600,fontSize:11,fontFamily:"inherit",cursor:"pointer",transition:"all .15s"}}>{t.l}</button>)}
      </div>
    </div>
    <div style={{padding:"14px 14px 0"}}>
      {!isG&&<div style={{background:"var(--blue-bg)",borderRadius:14,padding:"11px 14px",marginBottom:14,border:"1px solid var(--blue)22",display:"flex",gap:9}}>
        <span style={{fontSize:14}}>ℹ️</span>
        <div style={{fontSize:11,color:"var(--blue)",lineHeight:1.6}}><strong>Repasse</strong> → receptor aceita diretamente.<br/><strong>Troca</strong> → precisa da aprovação do Dr. Rodrigo.</div>
      </div>}
      {list.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"var(--muted)"}}><div style={{fontSize:36,marginBottom:12}}>{tab==="pendentes"?"🎉":"📭"}</div><div style={{fontWeight:700,color:"var(--body)",fontSize:15}}>{tab==="pendentes"?"Nenhuma pendência!":"Histórico vazio"}</div></div>}
      {list.map(t=>{
        const dono=getU2(t.dono),rec=getU2(t.receptor),sO=getS(t.shiftId),sD=t.shiftDest?getS(t.shiftDest):null;
        const isPend=t.status==="pendente",isAguard=t.status==="aguardando_gestor";
        const bc=t.tipo==="troca"?"var(--purple)":"var(--teal)";
        const canAceitarRepasse=!isG&&t.tipo==="repasse"&&isPend&&t.receptor===user.id;
        const canAceitarTroca=isG&&t.tipo==="troca"&&(isPend||isAguard);
        return<div key={t.id} style={{background:"var(--card)",borderRadius:20,marginBottom:14,boxShadow:"var(--sh)",overflow:"hidden",border:(isPend||isAguard)?`1.5px solid ${bc}`:"1px solid var(--border)"}}>
          <div style={{background:t.tipo==="troca"?"var(--purple-bg)":"var(--teal-bg)",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:14}}>{t.tipo==="troca"?"🔄":"➡️"}</span><span style={{fontSize:13,fontWeight:700,color:bc}}>{t.tipo==="troca"?"Troca de Plantão":"Repasse de Plantão"}</span></div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {isPend&&<span style={{fontSize:10,fontWeight:600,color:"var(--orange)",background:"var(--orange-bg)",padding:"3px 9px",borderRadius:20}}>⏳ Pendente</span>}
              {isAguard&&<span style={{fontSize:10,fontWeight:600,color:"var(--purple)",background:"var(--purple-bg)",padding:"3px 9px",borderRadius:20}}>👨‍⚕️ Aguarda gestor</span>}
              {t.status==="aceita"&&<span style={{fontSize:10,fontWeight:600,color:"var(--green)",background:"var(--green-bg)",padding:"3px 9px",borderRadius:20}}>✓ Aceita</span>}
              {t.status==="recusada"&&<span style={{fontSize:10,fontWeight:600,color:"var(--red)",background:"var(--red-bg)",padding:"3px 9px",borderRadius:20}}>✗ Recusada</span>}
            </div>
          </div>
          <div style={{padding:"14px 16px"}}>
            <div style={{display:"grid",gridTemplateColumns:t.tipo==="troca"?"1fr auto 1fr":"1fr",gap:9,marginBottom:10}}>
              <div style={{background:"var(--bg)",borderRadius:12,padding:"10px 12px"}}>
                <div style={{fontSize:9,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",marginBottom:6}}>De</div>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}><Av uid={dono?.id} name={dono?.nome||"?"} size={22} ini={dono?.ini} color={dono?.color} getPhoto={getPhoto}/><span style={{fontSize:12,fontWeight:600,color:"var(--h1)"}}>{dono?.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" ")}</span></div>
                <div style={{fontSize:11,fontWeight:600,color:"var(--h1)"}}>{String(t.dayOrig||0).padStart(2,"0")}/05 · {sO?.time}–{sO?.timeEnd}</div>
              </div>
              {t.tipo==="troca"&&<><div style={{display:"flex",alignItems:"center"}}><div style={{width:28,height:28,borderRadius:"50%",background:"var(--purple-bg)",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" strokeWidth="2"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg></div></div>
              <div style={{background:"var(--bg)",borderRadius:12,padding:"10px 12px"}}>
                <div style={{fontSize:9,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",marginBottom:6}}>Com</div>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}><Av uid={rec?.id} name={rec?.nome||"?"} size={22} ini={rec?.ini} color={rec?.color} getPhoto={getPhoto}/><span style={{fontSize:12,fontWeight:600,color:"var(--h1)"}}>{rec?.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" ")}</span></div>
                <div style={{fontSize:11,fontWeight:600,color:"var(--h1)"}}>{String(t.dayDest||0).padStart(2,"0")}/05 · {sD?.time}–{sD?.timeEnd}</div>
              </div></>}
              {t.tipo==="repasse"&&<div style={{background:"var(--teal-bg)",borderRadius:12,padding:"10px 12px",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:16}}>➡️</span><div><div style={{fontSize:9,fontWeight:600,color:"var(--teal)",textTransform:"uppercase",marginBottom:5}}>Assume</div><div style={{display:"flex",alignItems:"center",gap:7}}><Av uid={rec?.id} name={rec?.nome||"?"} size={20} ini={rec?.ini} color={rec?.color} getPhoto={getPhoto}/><span style={{fontSize:12,fontWeight:600,color:"var(--teal)"}}>{rec?.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" ")}</span></div></div></div>}
            </div>
            {t.motivo&&<div style={{background:"var(--bg)",borderRadius:10,padding:"7px 10px",marginBottom:10,border:"1px solid var(--border)"}}><span style={{fontSize:10,fontWeight:600,color:"var(--muted)"}}>Motivo: </span><span style={{fontSize:11,color:"var(--body)",fontStyle:"italic"}}>"{t.motivo}"</span></div>}
            {canAceitarRepasse&&<div style={{background:"var(--teal-bg)",borderRadius:12,padding:"11px 13px",marginBottom:4,border:"1px solid var(--teal)22"}}>
              <div style={{fontSize:12,fontWeight:700,color:"var(--teal)",marginBottom:8}}>➡️ Você pode aceitar este repasse diretamente</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <button onClick={()=>aceitar(t)} style={{padding:"11px",background:"linear-gradient(135deg,var(--teal),#0E7490)",border:"none",borderRadius:11,color:"#fff",fontSize:13,fontWeight:600,fontFamily:"inherit",cursor:"pointer"}}>✓ Aceitar</button>
                <button onClick={()=>recusar(t.id)} style={{padding:"11px",background:"var(--red-bg)",border:"1px solid var(--red)22",borderRadius:11,color:"var(--red)",fontSize:13,fontWeight:600,fontFamily:"inherit",cursor:"pointer"}}>✗ Recusar</button>
              </div>
            </div>}
            {canAceitarTroca&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:4}}>
              <button onClick={()=>aceitar(t)} style={{padding:"11px",background:"linear-gradient(135deg,var(--green),#15803D)",border:"none",borderRadius:11,color:"#fff",fontSize:13,fontWeight:600,fontFamily:"inherit",cursor:"pointer"}}>✓ Aprovar troca</button>

            </div>}

            {t.resolvidaEm&&<div style={{fontSize:10,color:"var(--muted)",textAlign:"right",marginTop:6}}>{t.resolvidaEm}</div>}

        </div>;

    <Fld label="Data de nascimento (opcional)" value={form.nascimento} onChange={e=>sF(f=>({...f,nascimento:e.target.value}))} type="date"/>
    <div style={{marginBottom:14}}><label style={{display:"block",fontSize:11,fontWeight:600,color:"var(--body)",marginBottom:8,textTransform:"uppercase",letterSpacing:".06em"}}>Cor do avatar</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{COLORS.map(c=><div key={c} onClick={()=>sF(f=>({...f,color:c}))} style={{width:30,height:30,borderRadius:"50%",background:c,cursor:"pointer",border:`3px solid ${form.color===c?"#fff":"transparent"}`,boxShadow:form.color===c?`0 0 0 2px ${c}`:""}}/>)}</div></div>
    {form.nome.trim()&&<div style={{background:"var(--bg)",borderRadius:12,padding:"11px 13px",marginBottom:13,display:"flex",alignItems:"center",gap:10,border:"1px solid var(--border)"}}><div style={{width:40,height:40,borderRadius:"50%",background:form.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:700}}>{(()=>{const p=form.nome.replace(/Dr\. |Dra\. /,"").split(" ");return((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase();})()}</div><div><div style={{fontSize:13,fontWeight:700,color:"var(--h1)"}}>{form.nome}</div><div style={{fontSize:11,color:"var(--muted)",marginTop:1}}>{form.crm||"CRM"} · {form.login||"login"}</div></div></div>}
    <Btn onClick={add} disabled={!ok2}>✓ Adicionar à equipe</Btn>
  </Modal>;
}
function EditMedModal({u,setUsers,onClose,toggleAtivo,getPhoto,setPhoto}){
  const[form,sF]=useState({...u});
  const handlePh=(e)=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=async(ev)=>{const b64=ev.target.result;sF(x=>({...x,foto:b64}));if(setPhoto)await setPhoto(u.id,b64);};r.readAsDataURL(f);};
  const save=async()=>{if(setUsers)await setUsers(prev=>prev.map(x=>x.id===u.id?{...form,ini:(()=>{const p=form.nome.replace(/Dr\. |Dra\. /,"").split(" ");return((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase();})()}:x));onClose();};
  return<Modal title={`✏️ Editar · ${u.nome.replace(/Dr\. |Dra\. /,"").split(" ")[0]}`} onClose={onClose}>
    {/* Photo upload */}
    <div style={{display:"flex",alignItems:"center",gap:13,marginBottom:16,background:"var(--bg)",borderRadius:14,padding:"13px"}}>
      <div style={{position:"relative",cursor:"pointer"}} onClick={()=>document.getElementById("editPh_"+u.id)?.click()}>
        <div style={{width:62,height:62,borderRadius:"50%",overflow:"hidden",border:`2px solid ${u.color}44`,boxShadow:`0 3px 12px ${u.color}22`}}>
          {(form.foto||getPhoto?.(u.id))?<img src={form.foto||getPhoto(u.id)} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{width:"100%",height:"100%",background:u.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18,fontWeight:700}}>{u.ini}</div>}
        </div>
        <div style={{position:"absolute",bottom:0,right:0,width:22,height:22,borderRadius:"50%",background:"var(--blue)",border:"2px solid var(--card)",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 0 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
      </div>
      <div><div style={{fontSize:13,fontWeight:700,color:"var(--h1)"}}>{form.nome||"Nome"}</div><div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>Toque na foto para alterar</div></div>
      <input id={"editPh_"+u.id} type="file" accept="image/*" onChange={handlePh} style={{display:"none"}}/>
    </div>
    <Fld label="Nome completo" value={form.nome} onChange={e=>sF(f=>({...f,nome:e.target.value}))}/>
    <Fld label="CRM" value={form.crm} onChange={e=>sF(f=>({...f,crm:e.target.value}))}/>
    <Fld label="E-mail" value={form.email} onChange={e=>sF(f=>({...f,email:e.target.value}))} type="email"/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Fld label="Login" value={form.login} onChange={e=>sF(f=>({...f,login:e.target.value}))}/>
      <Fld label="Nova senha" value={form.senha} onChange={e=>sF(f=>({...f,senha:e.target.value}))} placeholder="Alterar…"/>
    </div>
    <Fld label="Data de nascimento" value={form.nascimento||""} onChange={e=>sF(f=>({...f,nascimento:e.target.value}))} type="date"/>
    <Btn onClick={save}>✓ Salvar alterações</Btn>
    <Btn onClick={()=>{toggleAtivo(u.id);onClose();}} color={u.ativo===false?"var(--green)":"var(--red)"} ghost>{u.ativo===false?"✓ Reativar":"⊘ Desativar plantonista"}</Btn>
  </Modal>;
}
// ── NAV BAR ────────────────────────────────────────────
function Nav({active,setActive,user,pendT,pendMsg}){
  const isG=user.role==="gestor";
  const tabs=[
    {id:"home",l:"Início",ic:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
    {id:"escala",l:"Escala",ic:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
    {id:"_add",l:""},
    {id:"trocas",l:"Trocas",badge:pendT,ic:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>},
    {id:isG?"relatorios":"msgs",l:isG?"Relatórios":"Msgs",badge:isG?0:pendMsg,ic:c=>isG
      ?<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      :<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>},
  ];
  return<div className="nav-safe" style={{position:"fixed",bottom:0,left:0,right:0,background:"var(--nav)",borderTop:"1px solid var(--nav-border)",display:"flex",alignItems:"center",height:70,boxShadow:"0 -4px 20px rgba(0,0,0,.06)",zIndex:50}}>
    {tabs.map(tab=>{
      if(tab.id==="_add")return<div key="_add" style={{flex:1,display:"flex",justifyContent:"center",alignItems:"center"}}>
        <button onClick={()=>setActive(isG?"equipe":"perfil")} style={{width:54,height:54,borderRadius:"50%",background:"linear-gradient(135deg,#1565C0,#0D47A1)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 18px rgba(21,101,192,.45),0 0 0 4px var(--bg)",marginBottom:10,transition:"transform .15s"}} onMouseOver={e=>e.currentTarget.style.transform="scale(1.08)"} onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>
          {isG?<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          :<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>}
        </button>
      </div>;
      const isAct=active===tab.id;
      return<button key={tab.id} onClick={()=>setActive(tab.id)} style={{flex:1,height:"100%",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,fontFamily:"inherit",position:"relative",transition:"opacity .12s"}}>
        <div style={{position:"relative",transition:"transform .15s",transform:isAct?"translateY(-2px)":"none"}}>
          {tab.ic&&tab.ic(isAct?"var(--blue)":"var(--muted)")}
          {(tab.badge||0)>0&&<div style={{position:"absolute",top:-3,right:-4,width:16,height:16,borderRadius:"50%",background:"var(--red)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 4px var(--red)44"}}><span style={{fontSize:9,fontWeight:800,color:"#fff"}}>{tab.badge}</span></div>}
        </div>
        {tab.l&&<span style={{fontSize:10,fontWeight:isAct?700:500,color:isAct?"var(--blue)":"var(--muted)",letterSpacing:".01em",transition:"color .15s"}}>{tab.l}</span>}
        {isAct&&<div style={{position:"absolute",bottom:0,width:24,height:3,borderRadius:"3px 3px 0 0",background:"var(--blue)",boxShadow:"0 0 8px var(--blue)66"}}/>}
      </button>;
    })}
  </div>;
}

// ── APP ROOT ──────────────────────────────────────────
function App(){
  const[state,setState]=useState("splash");const[user,sUser]=useState(null);const[tab,sTab]=useState("home");const[darkMode,sDark]=useState(false);
  const[shifts,setShifts,shOk]=useShared(SK.SH,SH_DEF);
  const[trocas,setTrocas,trOk]=useShared(SK.TR,[]);
  const[msgs,setMsgs,msgOk]=useShared(SK.MSG,[]);
  const[users,setUsers,usOk]=useShared(SK.US,USERS_DEFAULT);
  const[log,setLog]=useShared(SK.LG,[]);
  const ok=shOk&&trOk&&msgOk&&usOk;
  // Fotos compartilhadas
  const{getPhoto,setPhoto}=usePhotos(users);
  const{ns,dm}=useNotifs(user?.id,trocas,msgs);
  const pendT=(trocas||[]).filter(t=>t.status==="pendente"||t.status==="aguardando_gestor").length;
  const pendMsg=useMemo(()=>(!msgs||!user)?0:(msgs||[]).filter(m=>(m.para===user?.id||m.para==="todos")&&m.de!==user?.id).length,[msgs,user]);
  const[alertaAtivo,sAlertaAtivo]=useState(null);
  const{alert:shiftAlert,clearAlert}=useShiftAlert(user,shifts);
  const birthdays=useBirthdays(users);
  useAutoDark(sDark);
  // Mostrar alertas do gestor
  useEffect(()=>{
    if(!log||!user||user.role==="gestor")return;
    const last=(log||[]).filter(l=>l.tipo==="alerta").sort((a,b)=>b.id-a.id)[0];
    if(last&&last.msg)sAlertaAtivo(last.msg);
  },[log]);
  const addLog=useCallback(async(e)=>setLog(prev=>[{...e,id:Date.now()},...(prev||[])].slice(0,500)),[setLog]);
  useEffect(()=>{_dk=darkMode;document.body.className=darkMode?"dark":"";document.body.style.background=darkMode?"#0A0F1E":"var(--bg)";},[darkMode]);
  const login=u=>{sUser(u);setState("main");sTab("home");};
  const logout=()=>{sUser(null);setState("login");sTab("home");};
  const isG=user?.role==="gestor";
  const shared={user,shifts,setShifts,trocas,setTrocas,ok,setTab:sTab,darkMode,setDarkMode:sDark,users,addLog,getPhoto};
  const screens={
    home:isG?<HomeGestor {...shared} msgs={msgs}/>:<HomePlant {...shared}/>,
    escala:<Escala {...shared}/>,
    trocas:<Trocas {...shared}/>,
    relatorios:<Relatorios user={user} shifts={shifts} users={users} getPhoto={getPhoto}/>,
    msgs:<Mensagens user={user} msgs={msgs} setMsgs={setMsgs} users={users} getPhoto={getPhoto}/>,
    equipe:<Equipe user={user} shifts={shifts} users={users} setUsers={setUsers} getPhoto={getPhoto} setPhoto={setPhoto}/>,
    perfil:<Perfil user={user} shifts={shifts} users={users} setUsers={setUsers} darkMode={darkMode} setDarkMode={sDark} onLogout={logout} getPhoto={getPhoto} setPhoto={setPhoto}/>,
  };
  const mainTab=isG?{home:true,escala:true,trocas:true,relatorios:true,equipe:true,perfil:true}:{home:true,escala:true,trocas:true,msgs:true,equipe:true,perfil:true};
  return<div style={{display:"flex",flexDirection:"column",height:"100dvh",overflow:"hidden",background:"var(--bg)",width:"100%",transition:"background .3s"}}>
    {state==="main"&&ns.length>0&&<NotifBanner n={ns[0]} dm={dm}/>}
    {state==="main"&&alertaAtivo&&<AlertaGestor msg={alertaAtivo} onDismiss={()=>sAlertaAtivo(null)}/>}
    {state==="main"&&shiftAlert&&!isG&&<ShiftAlertBanner shift={shiftAlert} users={users} onDismiss={clearAlert}/>}
    {state==="main"&&birthdays.length>0&&isG&&<div style={{position:"fixed",top:56,left:10,right:10,zIndex:599,background:"linear-gradient(135deg,#DB2777,#9333EA)",borderRadius:16,padding:"12px 16px",boxShadow:"0 8px 28px rgba(219,39,119,.3)",display:"flex",alignItems:"center",gap:10,animation:"slideDown .3s ease",fontFamily:"'Inter',sans-serif",zIndex:598}}>
      <span style={{fontSize:22}}>🎂</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"#fff"}}>Aniversário hoje!</div><div style={{fontSize:11,color:"rgba(255,255,255,.85)",marginTop:1}}>{birthdays.map(u=>u.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" ")).join(", ")}</div></div><button onClick={()=>setBdays([])} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:8,padding:"5px 9px",cursor:"pointer",color:"#fff",fontSize:11,fontWeight:600,fontFamily:"inherit"}}>✕</button>
    </div>}
    {state==="main"&&user&&<>
      <div key={tab} style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",animation:"fadeIn .18s ease"}}>
        {screens[tab]||screens.home}
      </div>
      <Nav active={tab} setActive={sTab} user={user} pendT={pendT} pendMsg={pendMsg}/>
    </>}
    {state==="login"&&<Login onLogin={login} users={users&&users.length>0?users:USERS_DEFAULT}/>}
    {state==="splash"&&<Splash onDone={()=>setState("login")}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
