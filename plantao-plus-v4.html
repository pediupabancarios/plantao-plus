// ── GEO ──────────────────────────────────────────────────
function distM(la1,lo1,la2,lo2){const R=6371000,r=x=>x*Math.PI/180;const a=Math.sin(r(la2-la1)/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(r(lo2-lo1)/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function useGeo(){
  const[g,sG]=useState({status:"idle",dist:null,coords:null,ts:null});
  const check=useCallback(()=>{
    if(!navigator.geolocation){sG(x=>({...x,status:"erro",msg:"GPS não suportado"}));return;}
    sG(x=>({...x,status:"loading"}));
    navigator.geolocation.getCurrentPosition(
      p=>{const{latitude:lat,longitude:lng,accuracy}=p.coords;const d=distM(lat,lng,HOSP.lat,HOSP.lng);sG({status:d<=RAIO?"dentro":"fora",dist:Math.round(d),coords:{lat,lng,acc:Math.round(accuracy)},ts:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})});},
      e=>{const m={1:"Permissão negada",2:"Posição indisponível",3:"Tempo esgotado"};sG({status:e.code===1?"negado":"erro",dist:null,coords:null,ts:null,msg:m[e.code]});},
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  },[]);
  return{geo:g,check};
}

async function sGet(k){try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null;}catch{return null;}}
async function sSet(k,v){try{await window.storage.set(k,JSON.stringify(v),true);}catch{}}

function useShared(key,def,ms=3000){
  const[val,sV]=useState(def);const[ok,sOk]=useState(false);const last=useRef("");
  useEffect(()=>{(async()=>{const s=await sGet(key);if(s){sV(s);last.current=JSON.stringify(s);}else{await sSet(key,def);last.current=JSON.stringify(def);}sOk(true);})();},[]);
  useEffect(()=>{if(!ok)return;const i=setInterval(async()=>{const s=await sGet(key);if(s){const str=JSON.stringify(s);if(str!==last.current){sV(s);last.current=str;}}},ms);return()=>clearInterval(i);},[ok,ms]);
  const upd=useCallback(async(nv)=>{const r=typeof nv==="function"?nv(val):nv;sV(r);last.current=JSON.stringify(r);await sSet(key,r);},[key,val]);
  return[val,upd,ok];
}

// ── NOTIFICATIONS ──────────────────────────────────────────
function useNotifs(uid,trocas){
  const[ns,sNs]=useState([]);const seen=useRef(new Set());
  useEffect(()=>{
    if(!uid&&uid!==0) return;
    const news=[];
    trocas.forEach(t=>{
      const kR=`t_${t.id}_pend_${t.receptor}`,kA=`t_${t.id}_ace`,kRe=`t_${t.id}_rec`;
      if(t.receptor===uid&&t.status==="pendente"&&!seen.current.has(kR)){news.push({id:kR,tipo:"recv",msg:`${getU(t.dono)?.nome.replace(/Dr\. |Dra\. /,"").split(" ")[0]} quer trocar plantão com você`,time:t.criadaEm,color:"#7c3aed"});seen.current.add(kR);}
      if(t.dono===uid&&t.status==="aceita"&&!seen.current.has(kA)){news.push({id:kA,tipo:"ok",msg:"Sua troca foi aceita pelo gestor ✓",time:t.resolvidaEm||"",color:"#16a34a"});seen.current.add(kA);}
      if(t.dono===uid&&t.status==="recusada"&&!seen.current.has(kRe)){news.push({id:kRe,tipo:"no",msg:"Sua troca foi recusada",time:t.resolvidaEm||"",color:"#dc2626"});seen.current.add(kRe);}
    });
    if(news.length)sNs(p=>[...news,...p].slice(0,30));
  },[trocas,uid]);
  const dm=useCallback(id=>sNs(p=>p.filter(n=>n.id!==id)),[]);
  const clr=useCallback(()=>sNs([]),[]);
  return{ns,dm,clr};
}

// ── COUNTDOWN ─────────────────────────────────────────────
function Countdown({targetDay,targetTime,tipo}){
  const[left,sLeft]=useState("");
  useEffect(()=>{
    const calc=()=>{
      const now=new Date();const[h,m]=targetTime.split(":").map(Number);
      const target=new Date(2026,4,targetDay,h,m,0);
      const diff=target-now;
      if(diff<=0){sLeft("Agora!");return;}
      const days=Math.floor(diff/86400000);const hrs=Math.floor((diff%86400000)/3600000);const mins=Math.floor((diff%3600000)/60000);
      if(days>0)sLeft(`${days}d ${hrs}h ${mins}min`);
      else if(hrs>0)sLeft(`${hrs}h ${mins}min`);
      else sLeft(`${mins}min`);
    };
    calc();const i=setInterval(calc,30000);return()=>clearInterval(i);
  },[targetDay,targetTime]);
  const T=getTheme();
  return(<div style={{display:"inline-flex",alignItems:"center",gap:5,background:tipo==="Diurno"?T.greenBg:T.purpleBg,borderRadius:20,padding:"3px 10px"}}>
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={tipo==="Diurno"?T.green:T.purple} strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span style={{fontSize:10,fontWeight:700,color:tipo==="Diurno"?T.green:T.purple}}>em {left}</span>
  </div>);}

// ── TROCAS ────────────────────────────────────────────────
function Trocas({user,shifts,setShifts,trocas,setTrocas,ok}){
  const T=getTheme();
  const[tab,sTab]=useState("pendentes");const[nova,sNova]=useState(false);const isG=user.role==="gestor";
  const mine=isG?trocas:trocas.filter(t=>t.dono===user.id||t.receptor===user.id);
  const pend=mine.filter(t=>t.status==="pendente"),hist=mine.filter(t=>t.status!=="pendente");const list=tab==="pendentes"?pend:hist;
  const getS=id=>Object.values(shifts).flat().find(s=>s.id===id);
  const aceitar=async(t)=>{
    const nv=JSON.parse(JSON.stringify(shifts));
    if(t.tipo==="repasse"){const s=nv[t.dayOrig]?.find(x=>x.id===t.shiftId);if(s)s.plantonistas=s.plantonistas.map(id=>id===t.dono?t.receptor:id);}
    else{const sO=nv[t.dayOrig]?.find(x=>x.id===t.shiftId),sD=nv[t.dayDest]?.find(x=>x.id===t.shiftDest);if(sO&&sD){const tmp=t.dono;nv[t.dayOrig]=nv[t.dayOrig].map(s=>s.id===t.shiftId?{...s,plantonistas:s.plantonistas.map(id=>id===t.dono?t.receptor:id)}:s);nv[t.dayDest]=nv[t.dayDest].map(s=>s.id===t.shiftDest?{...s,plantonistas:s.plantonistas.map(id=>id===t.receptor?tmp:id)}:s);}}

      </div>
    </div>
    <div style={{padding:"11px 10px"}}>
      {/* Card gestor */}
      <div style={{background:T.card,borderRadius:13,padding:"12px 14px",marginBottom:10,boxShadow:"0 3px 14px rgba(37,99,255,.12)",border:"1.5px solid rgba(37,99,255,.2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#2563ff,#1d4ed8)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#fff",fontSize:16,flexShrink:0,boxShadow:"0 3px 12px rgba(37,99,255,.4)"}}>RC</div>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:T.h1}}>Dr. Rodrigo Cahuana Chipayo</div><div style={{fontSize:10,color:T.muted}}>CRM 11707/PB · rodrigoyjuliana@gmail.com</div></div>
          <div style={{background:"rgba(37,99,255,.1)",borderRadius:20,padding:"3px 9px"}}><span style={{fontSize:9,fontWeight:700,color:T.accent}}>GESTOR</span></div>

      </div>
      <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:7,paddingLeft:2}}>Plantonistas ({filt.length})</div>
      {filt.map(p=>{const st=statsFor(p.id);return(
        <div key={p.id} style={{background:T.card,borderRadius:13,padding:"12px 14px",marginBottom:8,boxShadow:T.shadow}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <Av name={p.nome} size={42} ini={p.ini} color={p.color}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,color:T.h1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.nome}</div>
              <div style={{fontSize:10,color:T.muted}}>{p.crm} · {p.esp}</div>
              <div style={{display:"flex",gap:8,marginTop:4}}>
                {st.concl>0&&<span style={{fontSize:9,color:T.green,fontWeight:700,background:T.greenBg,padding:"1px 7px",borderRadius:20}}>✓ {st.concl} concl.</span>}
                {st.prox>0&&<span style={{fontSize:9,color:T.accent,fontWeight:700,background:"#eff6ff",padding:"1px 7px",borderRadius:20}}>📅 {st.prox} próx.</span>}
              </div>
            </div>
            {isG&&<div style={{display:"flex",gap:5,flexShrink:0}}>
              <button onClick={()=>sCred(p)} style={{background:"#eff6ff",border:"none",borderRadius:8,padding:"6px 9px",cursor:"pointer",color:T.accent,fontSize:9,fontWeight:700,fontFamily:"inherit"}}>🔑</button>
            </div>}
          </div>
        </div>
      );})}
      {filt.length===0&&<div style={{textAlign:"center",padding:"30px",color:T.muted,fontSize:13}}><div style={{fontSize:28,marginBottom:8}}>🔍</div>Nenhum médico encontrado</div>}
    </div>
    {cred&&isG&&<Modal title="Credenciais de Acesso" onClose={()=>sCred(null)}>

        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:11}}><Av name={cred.nome} size={42} ini={cred.ini} color={cred.color}/><div><div style={{fontSize:13,fontWeight:700,color:T.h1}}>{cred.nome}</div><div style={{fontSize:10,color:T.muted}}>{cred.crm}</div></div></div>
        {[{l:"Login",v:cred.login,mono:true},{l:"Senha inicial",v:cred.senha,mono:true},{l:"E-mail",v:cred.email}].map(item=>(
          <div key={item.l} style={{background:T.card,borderRadius:9,padding:"9px 11px",marginBottom:6,border:`1px solid ${T.border}`}}>
            <div style={{fontSize:9,fontWeight:700,color:T.muted,textTransform:"uppercase",marginBottom:2}}>{item.l}</div>
            <div style={{fontSize:12,fontWeight:700,color:T.h1,fontFamily:item.mono?"monospace":"inherit"}}>{item.v}</div>
          </div>
        ))}
      </div>
      <div style={{background:T.orangeBg,borderRadius:10,padding:"9px 12px",marginBottom:12,border:`1px solid ${T.orange}33`,display:"flex",gap:7}}><span>⚠️</span><div style={{fontSize:10,color:"#92400e",lineHeight:1.4}}>Compartilhe apenas com o plantonista. Recomende alterar a senha no primeiro acesso.</div></div>
      <button onClick={()=>{navigator.clipboard?.writeText(`*Plantão+* · Acesso ao aplicativo\n\nOlá, ${cred.nome.replace(/Dr\. |Dra\. /,"").split(" ")[0]}!\n\n*Login:* ${cred.login}\n*Senha:* ${cred.senha}\n\nLink: ${window.location.href}`);}} style={{width:"100%",padding:"10px",background:"#eff6ff",border:`1.5px solid ${T.accent}`,borderRadius:10,color:T.accent,fontSize:12,fontWeight:700,fontFamily:"inherit",cursor:"pointer",marginBottom:8}}>📋 Copiar credenciais</button>
      <button onClick={()=>window.open(`https://wa.me/?text=${encodeURIComponent(`*Plantão+* · Acesso ao app\n\nOlá, ${cred.nome.replace(/Dr\. |Dra\. /,"").split(" ")[0]}!\n\n*Login:* ${cred.login}\n*Senha:* ${cred.senha}\n\nAcesse:\n${window.location.href}`)}`,"_blank")} style={{width:"100%",padding:"10px",background:"#25D366",border:"none",borderRadius:10,color:"#fff",fontSize:12,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>💬 Enviar pelo WhatsApp</button>

  </div>);}
// ── MAIS / PERFIL ─────────────────────────────────────────

          <div style={{width:5,height:5,borderRadius:"50%",background:isG?"#93c5fd":"#86efac"}}/>

          <div style={{width:5,height:5,borderRadius:"50%",background:"#4ade80",animation:"pulse2 1.5s infinite"}}/>

        <div style={{fontSize:11,fontWeight:700,color:T.h1,marginBottom:11}}>📊 Meu resumo · Maio 2026</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>
          {[{l:"Plantões",v:concl.length,c:T.accent},{l:"Horas",v:`${horas}h`,c:T.green},{l:"Estimado",v:fmtCurrency(valor),c:T.orange}].map(i=>(
            <div key={i.l} style={{background:T.bg,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:900,color:i.c}}>{i.v}</div>
              <div style={{fontSize:9,color:T.muted,marginTop:2}}>{i.l}</div>
            </div>

        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>{darkMode?"☀️":"🌙"}</span>
          <div><div style={{fontSize:13,fontWeight:700,color:T.h1}}>{darkMode?"Modo Claro":"Modo Escuro"}</div><div style={{fontSize:10,color:T.muted}}>Toque para alternar o tema</div></div>
        </div>
        <div style={{width:44,height:24,borderRadius:12,background:darkMode?T.accent:T.border,position:"relative",transition:"background .3s"}}>
          <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:darkMode?23:3,transition:"left .3s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
        </div>
      </div>

      {/* Credenciais */}

        <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Suas credenciais</div>
        {[{l:"Login",v:user.login},{l:"Senha",v:"••••••••"},{l:"E-mail",v:user.email}].map(item=>(
          <div key={item.l} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${T.border}`}}>
            <span style={{fontSize:11,color:T.body,fontWeight:600}}>{item.l}</span>
            <span style={{fontSize:11,fontWeight:700,color:T.h1,fontFamily:"monospace"}}>{item.v}</span>

      {/* Status tempo real */}
      <div style={{background:T.card,borderRadius:13,padding:"13px 15px",marginBottom:11,boxShadow:T.shadow}}>
        <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:9}}>Sistema em Tempo Real</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:7}}>
          <div style={{width:34,height:34,borderRadius:"50%",background:T.greenBg,display:"flex",alignItems:"center",justifyContent:"center"}}>

      ].map((g,gi)=>(
        <div key={gi} style={{background:T.card,borderRadius:13,overflow:"hidden",boxShadow:T.shadow,marginBottom:10}}>
          {g.items.map((item,ii)=>(
            <button key={item.l} onClick={item.action} style={{width:"100%",display:"flex",alignItems:"center",gap:11,padding:"13px 15px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",borderBottom:ii<g.items.length-1?`1px solid ${T.border}`:"none",color:item.red?T.red:T.h1,fontSize:13,fontWeight:600,textAlign:"left",transition:"background .1s"}} onMouseOver={e=>!item.red&&(e.currentTarget.style.background=T.bg)} onMouseOut={e=>e.currentTarget.style.background="none"}>

              {!item.red&&<svg style={{marginLeft:"auto"}} width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={T.muted} strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>}

    </div>
  </div>);}

// ── BOTTOM NAV ────────────────────────────────────────────
function Nav({active,setActive,user,pendT}){
  const T=getTheme();const isG=user.role==="gestor";
  const tabs=[
    {id:"home",l:"Início",ic:(c)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
    {id:"escala",l:"Escala",ic:(c)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
    {id:"_add",l:""},
    {id:"trocas",l:"Trocas",badge:pendT,ic:(c)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>},
    {id:isG?"financeiro":"mais",l:isG?"Financeiro":"Mais",ic:(c)=>isG
      ?<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      :<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>},
  ];
  return(<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,height:60,background:T.navBg,borderTop:`1px solid ${T.navBorder}`,display:"flex",alignItems:"center",boxShadow:"0 -4px 20px rgba(0,0,0,.1)",zIndex:50,fontFamily:"'Nunito',sans-serif"}}>
    {tabs.map(tab=>{
      if(tab.id==="_add")return(<div key="_add" style={{flex:1,display:"flex",justifyContent:"center",alignItems:"center"}}><button style={{width:46,height:46,borderRadius:"50%",background:`linear-gradient(135deg,${T.accent},${T.accentDark})`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 16px ${T.accentGlow},0 0 0 4px ${T.bg}`,marginBottom:9,transition:"transform .15s"}} onMouseOver={e=>e.currentTarget.style.transform="scale(1.1)"} onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>);
      const isAct=active===tab.id;
      return(<button key={tab.id} onClick={()=>setActive(tab.id)} style={{flex:1,height:"100%",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,fontFamily:"inherit",position:"relative",transition:"opacity .15s"}}>
        <div style={{position:"relative",transition:"transform .15s",transform:isAct?"translateY(-1px)":"translateY(0)"}}>
          {tab.ic&&tab.ic(isAct?T.accent:T.muted)}
          {tab.badge>0&&<div style={{position:"absolute",top:-3,right:-4,width:14,height:14,borderRadius:"50%",background:T.red,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 4px rgba(220,38,38,.4)"}}><span style={{fontSize:8,fontWeight:900,color:"#fff"}}>{tab.badge}</span></div>}
        </div>
        {tab.l&&<span style={{fontSize:9,fontWeight:isAct?800:500,color:isAct?T.accent:T.muted,letterSpacing:".01em"}}>{tab.l}</span>}
        {isAct&&<div style={{position:"absolute",bottom:0,width:20,height:3,borderRadius:"3px 3px 0 0",background:T.accent}}/>}
      </button>);
    })}
  </div>);}

// ── APP ROOT ──────────────────────────────────────────────
function App(){
  const[state,setState]=useState("splash");const[user,setUser]=useState(null);const[tab,setTab]=useState("home");
  const[darkMode,setDarkMode]=useState(false);
  const[shifts,setShifts,shiftsOk]=useShared(SK.SHIFTS,SD);
  const[trocas,setTrocas,trocasOk]=useShared(SK.TROCAS,[]);
  const ok=shiftsOk&&trocasOk;
  const{ns,dm}=useNotifs(user?.id,trocas);
  const pendT=trocas.filter(t=>t.status==="pendente").length;
  const isG=user?.role==="gestor";

  // Apply dark mode to theme
  useEffect(()=>{_darkMode=darkMode;document.body.style.background=darkMode?"#0a0f1e":"#0d2870";},[darkMode]);

  const login=u=>{setUser(u);setState("main");setTab("home");};
  const logout=()=>{setUser(null);setState("login");setTab("home");};

  const props={user,shifts,setShifts,trocas,setTrocas,ok,setTab};

  const screens={
    home:isG?<HomeGestor {...props} darkMode={darkMode} setDarkMode={setDarkMode}/>:<HomePlant {...props}/>,
    escala:<Escala {...props}/>,
    trocas:<Trocas {...props}/>,
    financeiro:<Financeiro user={user||USERS[0]} shifts={shifts}/>,
    equipe:<Equipe user={user||USERS[0]} shifts={shifts}/>,
    mais:<Mais user={user||USERS[1]} onLogout={logout} darkMode={darkMode} setDarkMode={setDarkMode} shifts={shifts} trocas={trocas}/>,
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100dvh",overflow:"hidden",background:getTheme().bg,position:"relative",maxWidth:430,margin:"0 auto",transition:"background .3s"}}>
      {/* Notificações em tempo real */}
      {state==="main"&&ns.length>0&&<NotifBanner n={ns[0]} dm={dm}/>}
      {/* App */}
      {state==="main"&&user&&<>{screens[tab]||screens.home}<Nav active={tab} setActive={setTab} user={user} pendT={pendT}/></>}
      {state==="login"&&<Login onLogin={login}/>}
      {state==="splash"&&<Splash onDone={()=>setState("login")}/>}
    </div>
  );}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
