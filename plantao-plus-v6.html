const SALARY_BASE=825,SALARY_PLUS=1185,SALARY_THRESHOLD=6;
const calcVal=n=>n<=SALARY_THRESHOLD?SALARY_BASE:SALARY_PLUS;
function calcSalary(uid,shifts){
  const all=Object.entries(shifts).flatMap(([d,ss])=>ss.map(s=>({...s,day:parseInt(d)})));
  const mine=all.filter(s=>s.plantonistas.includes(uid)&&(s.status==="concluido"||s.status==="fechado_gestor")).sort((a,b)=>a.day-b.day);
  let total=0;
  const items=mine.map((s,i)=>{const n=i+1,v=calcVal(n);total+=v;return{...s,num:n,valor:v};});
  return{items,total,count:mine.length,next:calcVal(mine.length+1),nextNum:mine.length+1};
}

function distM(la1,lo1,la2,lo2){const R=6371000,r=x=>x*Math.PI/180;const a=Math.sin(r(la2-la1)/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(r(lo2-lo1)/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function useGeo(){
  const[g,sG]=useState({status:"idle",dist:null,ts:null});
  const check=useCallback(()=>{
    if(!navigator.geolocation){sG(x=>({...x,status:"erro"}));return;}
    sG(x=>({...x,status:"loading"}));
    navigator.geolocation.getCurrentPosition(
      p=>{const d=distM(p.coords.latitude,p.coords.longitude,HOSP.lat,HOSP.lng);sG({status:d<=RAIO?"dentro":"fora",dist:Math.round(d),acc:Math.round(p.coords.accuracy),ts:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})});},
      e=>{sG({status:e.code===1?"negado":"erro",dist:null,ts:null});},
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  },[]);
  return{geo:g,check};
}

async function sGet(k){try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null;}catch{return null;}}
async function sSet(k,v){try{await window.storage.set(k,JSON.stringify(v),true);}catch{}}
function useShared(key,def,ms=3000){
  const[val,sV]=useState(def);const[ok,sOk]=useState(false);const last=useRef("");
  useEffect(()=>{(async()=>{const s=await sGet(key);if(s){sV(s);last.current=JSON.stringify(s);}else{await sSet(key,def);last.current=JSON.stringify(def);}sOk(true);})();},[]);
  useEffect(()=>{if(!ok)return;const i=setInterval(async()=>{const s=await sGet(key);if(s){const str=JSON.stringify(s);if(str!==last.current){sV(s);last.current=str;}}},ms);return()=>clearInterval(i);},[ok,ms]);
  const upd=useCallback(async(nv)=>{const r=typeof nv==="function"?nv(val):nv;sV(r);last.current=JSON.stringify(r);await sSet(key,r);},[key,val]);
  return[val,upd,ok];
}

// ── NOTIFS ────────────────────────────────────────────────
function useNotifs(uid,trocas,msgs){
  const[ns,sNs]=useState([]);const seen=useRef(new Set());
  useEffect(()=>{
    if(uid===undefined||uid===null)return;
    const news=[];
    (trocas||[]).forEach(t=>{
      const kR=`tr_${t.id}_p`,kA=`tr_${t.id}_a`,kRe=`tr_${t.id}_r`;
      if(t.receptor===uid&&t.status==="pendente"&&!seen.current.has(kR)){news.push({id:kR,tipo:"troca",msg:`Solicitação de troca recebida`,time:t.criadaEm,color:"#7c3aed"});seen.current.add(kR);}
      if(t.dono===uid&&t.status==="aceita"&&!seen.current.has(kA)){news.push({id:kA,tipo:"ok",msg:"Sua troca foi ✓ aceita",time:"",color:"#16a34a"});seen.current.add(kA);}
      if(t.dono===uid&&t.status==="recusada"&&!seen.current.has(kRe)){news.push({id:kRe,tipo:"no",msg:"Sua troca foi recusada",time:"",color:"#dc2626"});seen.current.add(kRe);}
    });
    (msgs||[]).filter(m=>(m.para===uid||m.para==="todos")&&m.de!==uid&&!seen.current.has(`msg_${m.id}`)).forEach(m=>{
      news.push({id:`msg_${m.id}`,tipo:"msg",msg:`Mensagem recebida`,time:m.hora,color:"#0891b2"});seen.current.add(`msg_${m.id}`);
    });
    if(news.length)sNs(p=>[...news,...p].slice(0,30));
  },[trocas,msgs,uid]);
  return{ns,dm:useCallback(id=>sNs(p=>p.filter(n=>n.id!==id)),[])};
}

        {jaE&&!jaS&&<><div style={{background:Th.greenBg,borderRadius:10,padding:"8px 11px",border:`1px solid ${Th.green}33`,display:"flex",gap:7,marginBottom:3}}><span>📍</span><div><div style={{fontSize:11,fontWeight:700,color:Th.green}}>Saída exige localização</div><div style={{fontSize:10,color:"#166534"}}>Precisa estar dentro de {RAIO}m.</div></div></div><GeoCard geo={geo} check={check} onConfirm={geo.status==="dentro"?()=>regS(s.id,mid):null} label="✓ Registrar minha saída" color={Th.green}/></>}

        <button onClick={()=>fecharG(s.id)} style={{padding:"10px",background:`linear-gradient(135deg,${Th.orange},#b45309)`,border:"none",borderRadius:9,color:"#fff",fontSize:12,fontWeight:700,fontFamily:"inherit",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>⚠ Fechar plantão completo</button>

      {isG&&<button onClick={()=>delS(s.id)} style={{padding:"9px",background:Th.redBg,border:`1px solid ${Th.red}22`,borderRadius:9,color:Th.red,fontSize:11,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>🗑 Remover plantão</button>}

// ── EXPORT MODAL ───────────────────────────────────────────
function ExpModal({shifts,vm,vy,onClose}){
  const Th=G();const[fmt,sFmt]=useState("whatsapp");const[cp,sCp]=useState(false);
  const build=()=>{
    const h=fmt==="whatsapp"?`📋 *ESCALA PEDIATRIA UPA JP*\n*${MONTHS[vm].toUpperCase()} / ${vy}*\n🏥 Dr. Rodrigo Cahuana · CRM 11707/PB\n${"─".repeat(28)}\n`:`ESCALA PEDIATRIA UPA JP — ${MONTHS[vm].toUpperCase()} ${vy}\n${"=".repeat(36)}\n`;
    const days=Object.keys(shifts).map(Number).sort((a,b)=>a-b);let body="";
    for(const day of days){const ss=shifts[day];if(!ss?.length)continue;const d=new Date(vy,vm,day);body+=fmt==="whatsapp"?`\n*${String(day).padStart(2,"0")}/${String(vm+1).padStart(2,"0")} (${DS[d.getDay()]})*\n`:`\n${String(day).padStart(2,"0")}/${String(vm+1).padStart(2,"0")} (${DS[d.getDay()]})\n`;
      for(const s of ss){const n=s.plantonistas.map(id=>USERS_DEFAULT.find(u=>u.id===id)).filter(Boolean).map(p=>p.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" ")).join(" + ");body+=`  ${s.tipo==="Diurno"?"☀️":"🌙"} ${s.time}–${s.timeEnd}  ${s.status==="concluido"?"✓":s.status==="em_andamento"?"●":"○"} ${n}\n`;}}
    return h+body+`\n${"─".repeat(28)}\n_Plantão+ v6.0 · ${new Date().toLocaleDateString("pt-BR")}_`;
  };
  const t=build();
  return(<Modal title="Exportar Escala" onClose={onClose}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>{["whatsapp","texto"].map(f=>(<button key={f} onClick={()=>sFmt(f)} style={{padding:"9px",borderRadius:10,border:`2px solid ${fmt===f?Th.accent:Th.border}`,background:fmt===f?Th.aBg:Th.bg,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:11,color:fmt===f?Th.accent:Th.body,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><span style={{fontSize:14}}>{f==="whatsapp"?"💬":"📄"}</span>{f==="whatsapp"?"WhatsApp":"Texto"}</button>))}</div>
    <div style={{background:Th.bg,borderRadius:10,padding:"10px 11px",maxHeight:170,overflowY:"auto",marginBottom:12,border:`1px solid ${Th.border}`}}><pre style={{fontSize:10,color:Th.h1,fontFamily:"monospace",whiteSpace:"pre-wrap",wordBreak:"break-word",margin:0,lineHeight:1.6}}>{t}</pre></div>
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      <button onClick={()=>window.open(`https://wa.me/?text=${encodeURIComponent(t)}`,"_blank")} style={{padding:"12px",background:"#25D366",border:"none",borderRadius:11,color:"#fff",fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>💬 Enviar pelo WhatsApp</button>
      <button onClick={()=>{if(navigator.share)navigator.share({title:"Escala",text:t});else{navigator.clipboard.writeText(t);sCp(true);setTimeout(()=>sCp(false),2500);}}} style={{padding:"11px",background:Th.tealBg,border:`1.5px solid ${Th.teal}`,borderRadius:11,color:Th.teal,fontSize:12,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>📤 Compartilhar</button>
      <button onClick={()=>{navigator.clipboard.writeText(t);sCp(true);setTimeout(()=>sCp(false),2500);}} style={{padding:"11px",background:cp?Th.greenBg:Th.bg,border:`1.5px solid ${cp?Th.green:Th.border}`,borderRadius:11,color:cp?Th.green:Th.body,fontSize:12,fontWeight:700,fontFamily:"inherit",cursor:"pointer",transition:"all .2s"}}>{cp?"✓ Copiado!":"📋 Copiar"}</button>
    </div>
  </Modal>);}
// ── FINANCEIRO ────────────────────────────────────────────
function Financeiro({user,shifts,setShifts,users}){
  const Th=G();const isG=user.role==="gestor";const allU=users||USERS_DEFAULT;
  const ps=useMemo(()=>allU.filter(u=>u.role==="plantonista"&&u.ativo!==false),[allU]);
  const statsAll=useMemo(()=>ps.map(u=>{
    const{items,total,count}=calcSalary(u.id,shifts);
    const pago=items.filter(s=>s.pago?.[u.id]).reduce((a,s)=>a+s.valor,0);
    return{...u,items,total,count,pago,pendente:total-pago};
  }).filter(u=>u.count>0).sort((a,b)=>b.count-a.count),[shifts,ps]);
  const mySal=useMemo(()=>calcSalary(user.id,shifts),[shifts,user.id]);
  const totalGeral=statsAll.reduce((a,u)=>a+u.total,0);
  const totalPago=statsAll.reduce((a,u)=>a+u.pago,0);
  const[showPagto,sShowPagto]=useState(null);
  const togglePago=(sId,uid)=>setShifts(p=>{const u=JSON.parse(JSON.stringify(p));Object.values(u).flat().forEach(s=>{if(s.id===sId){if(!s.pago)s.pago={};s.pago[uid]=!s.pago[uid];}});return u;});

      <div style={{position:"absolute",width:200,height:200,borderRadius:"50%",background:"radial-gradient(circle,rgba(180,83,9,.2) 0%,transparent 70%)",top:-80,right:-60,pointerEvents:"none"}}/>
      <div style={{fontSize:10,color:"rgba(255,255,255,.5)",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>Plantão+ · Financeiro</div>
      <div style={{fontSize:19,fontWeight:900,color:"#fff"}}>{isG?"Controle Financeiro":"Meus Rendimentos"}</div>
      <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginTop:1}}>1–6 plantões: R$825 · 7+: R$1.185</div>
    </div>
    <div style={{padding:"14px 12px"}}>
      {/* Regra visual */}
      <div style={{background:Th.card,borderRadius:13,padding:"13px 15px",marginBottom:13,boxShadow:Th.sh}}>
        <div style={{fontSize:11,fontWeight:700,color:Th.h1,marginBottom:10}}>📋 Tabela de valores</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:isG?0:10}}>
          <div style={{background:Th.greenBg,borderRadius:10,padding:"11px 13px",border:`1px solid ${Th.green}33`}}>
            <div style={{fontSize:9,fontWeight:700,color:Th.green,textTransform:"uppercase",marginBottom:5}}>Plantões 1 a 6</div>
            <div style={{fontSize:24,fontWeight:900,color:Th.green}}>R$ 825</div>
            <div style={{fontSize:9,color:Th.green,marginTop:2}}>por plantão</div>
          </div>
          <div style={{background:Th.goldBg,borderRadius:10,padding:"11px 13px",border:"1px solid #fcd34d"}}>
            <div style={{fontSize:9,fontWeight:700,color:Th.gold,textTransform:"uppercase",marginBottom:5}}>Plantões 7+</div>
            <div style={{fontSize:24,fontWeight:900,color:Th.gold}}>R$ 1.185</div>
            <div style={{fontSize:9,color:Th.orange,marginTop:2}}>por plantão</div>
          </div>
        </div>
        {!isG&&<div style={{marginTop:10,background:Th.aBg,borderRadius:9,padding:"9px 12px",border:`1px solid ${Th.accent}33`}}>
          <div style={{fontSize:11,fontWeight:700,color:Th.accent}}>Próximo plantão #{mySal.nextNum} → {fmtR(mySal.next)}</div>
          <div style={{fontSize:10,color:Th.body,marginTop:2}}>{mySal.count} plantões realizados · Total acumulado: <strong>{fmtR(mySal.total)}</strong></div>
        </div>}
      </div>

      {isG&&<>
        {/* Card total gestor */}
        <div style={{background:"linear-gradient(135deg,#1e3a8a,#1d4ed8)",borderRadius:14,padding:"16px 18px",marginBottom:13,boxShadow:"0 8px 32px rgba(37,99,255,.3)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",width:100,height:100,borderRadius:"50%",background:"rgba(255,255,255,.06)",right:-20,top:-20}}/>
          <div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginBottom:3}}>Total geral · todos os médicos</div>
          <div style={{fontSize:28,fontWeight:900,color:"#fff",letterSpacing:"-1px",marginBottom:8}}>{fmtR(totalGeral)}</div>

                  <div style={{fontSize:14,fontWeight:900,color:Th.green}}>{fmtR(u.total)}</div>
                  <div style={{fontSize:9,color:u.pendente>0?Th.orange:Th.green,fontWeight:600}}>{u.pendente>0?`${fmtR(u.pendente)} pend.`:"✓ pago"}</div>

        {tab==="detalhe"&&<>
          <div style={{fontSize:12,fontWeight:700,color:Th.h1,marginBottom:10}}>Plantões por médico</div>

              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{u.items.map(s=>(
                <div key={s.id} onClick={()=>togglePago(s.id,u.id)} style={{display:"flex",alignItems:"center",gap:4,background:s.pago?.[u.id]?Th.greenBg:Th.bg,borderRadius:8,padding:"4px 8px",border:`1px solid ${s.pago?.[u.id]?Th.green+"44":Th.border}`,cursor:"pointer"}}>
                  <span style={{fontSize:9,color:s.pago?.[u.id]?Th.green:Th.muted,fontWeight:700}}>#{s.num}</span>

function NovaTroca({user,shifts,setTrocas,users,onClose}){
  const Th=G();const allU=users||USERS_DEFAULT;const[tipo,sTipo]=useState("troca");const[dono,sDono]=useState(String(user.role==="plantonista"?user.id:""));const[rec,sRec]=useState("");const[shO,sSO]=useState("");const[shD,sSD]=useState("");const[motivo,sMot]=useState("");

  const sOf=id=>all.filter(s=>s.plantonistas.includes(parseInt(id))&&s.status==="agendado");

    {dono&&<Sel label="Turno a ceder" value={shO} onChange={e=>sSO(e.target.value)} options={[{v:"",l:"Selecionar turno…"},...sOf(dono).map(s=>({v:s.id,l:fS(s)}))]}/>}

// ── MENSAGENS ─────────────────────────────────────────────
function Mensagens({user,msgs,setMsgs,users}){
  const Th=G();const allU=users||USERS_DEFAULT;const isG=user.role==="gestor";
  const ps=allU.filter(u=>u.role==="plantonista"&&u.ativo!==false);

  const filtered=useMemo(()=>{
    if(!msgs)return[];
    return msgs.filter(m=>{
      if(isG){if(filt==="todos")return true;return String(m.para)===filt||String(m.de)===filt;}
      return m.para===user.id||m.para==="todos"||m.de===user.id;

    if(!texto.trim())return;const para=isG?(dest==="todos"?"todos":parseInt(dest)):0;
    await setMsgs(prev=>[{id:Date.now(),de:user.id,para,texto:texto.trim(),hora:nowFull(),urgente},...(prev||[])].slice(0,300));sTexto("");sUrgente(false);
  };

      {isG&&<div style={{marginTop:10,overflowX:"auto",display:"flex",gap:6,paddingBottom:2}}>
        {["todos",...ps.map(p=>String(p.id))].map(d=>{const u=d==="todos"?null:getU2(parseInt(d));return(

            {u&&<Av name={u.nome} size={14} ini={u.ini} color={u.color} foto={u.foto}/>}
            {u?u.nome.replace(/Dr\. |Dra\. /,"").split(" ")[0]:"📢 Todos"}
          </button>
        );})}

      {(!msgs||filtered.length===0)&&<div style={{textAlign:"center",padding:"32px 20px",color:Th.muted,fontSize:12}}><div style={{fontSize:28,marginBottom:8}}>💬</div><div style={{fontWeight:700,color:Th.body}}>Sem mensagens</div><div style={{fontSize:11,marginTop:4}}>Comece uma conversa!</div></div>}
      {filtered.map(m=>{
        const isMine=m.de===user.id;const autor=getU2(m.de);
        return(<div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:isMine?"flex-end":"flex-start",marginBottom:10}}>
          {!isMine&&<div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><Av name={autor?.nome||"?"} size={18} ini={autor?.ini} color={autor?.color} foto={autor?.foto}/><span style={{fontSize:10,fontWeight:700,color:Th.body}}>{autor?.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" ")}</span>{m.urgente&&<span style={{fontSize:9,fontWeight:700,color:"#dc2626",background:"#fee2e2",padding:"1px 6px",borderRadius:20}}>🚨 Urgente</span>}</div>}
          <div style={{maxWidth:"82%",background:isMine?`${user.color}18`:m.urgente?"#fef2f2":Th.card,borderRadius:isMine?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"9px 12px",border:`1px solid ${isMine?user.color+"33":m.urgente?"#fecaca":Th.border}`,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
            {m.para==="todos"&&!isMine&&<div style={{fontSize:8,fontWeight:700,color:Th.teal,marginBottom:3}}>📢 Para todos</div>}
            {isG&&m.para!=="todos"&&!isMine&&<div style={{fontSize:8,fontWeight:700,color:Th.purple,marginBottom:3}}>→ {getU2(m.para)?.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" ")||"?"}</div>}
            <div style={{fontSize:12,color:isMine?user.color:Th.h1,lineHeight:1.5}}>{m.texto}</div>
            <div style={{fontSize:9,color:Th.muted,marginTop:4,textAlign:isMine?"right":"left"}}>{m.hora}</div>
          </div>
        </div>);
      })}

  </div>);}

// ── BOTTOM NAV ────────────────────────────────────────────
function Nav({active,setActive,user,pendT,pendMsg}){
  const Th=G();const isG=user.role==="gestor";
  const tabs=[
    {id:"home",l:"Início",ic:c=><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
    {id:"escala",l:"Escala",ic:c=><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
    {id:"_add",l:""},
    {id:"trocas",l:"Trocas",badge:pendT,ic:c=><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>},
    {id:isG?"financeiro":"msgs",l:isG?"Finanças":"Msgs",badge:isG?0:pendMsg,ic:c=>isG
      ?<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      :<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>},
  ];
  return(<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,height:60,background:Th.nav,borderTop:`1px solid ${Th.navBorder}`,display:"flex",alignItems:"center",boxShadow:"0 -4px 20px rgba(0,0,0,.1)",zIndex:50,fontFamily:"'Nunito',sans-serif"}}>
    {tabs.map(tab=>{
      if(tab.id==="_add")return(<div key="_add" style={{flex:1,display:"flex",justifyContent:"center",alignItems:"center"}}><button onClick={()=>setActive("escala")} style={{width:46,height:46,borderRadius:"50%",background:`linear-gradient(135deg,${Th.accent},${Th.aD})`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 16px ${Th.accent}44,0 0 0 4px ${Th.bg}`,marginBottom:9}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>);
      const isAct=active===tab.id;
      return(<button key={tab.id} onClick={()=>setActive(tab.id)} style={{flex:1,height:"100%",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,fontFamily:"inherit",position:"relative"}}>
        <div style={{position:"relative",transition:"transform .15s",transform:isAct?"translateY(-1px)":"none"}}>
          {tab.ic&&tab.ic(isAct?Th.accent:Th.muted)}
          {(tab.badge||0)>0&&<div style={{position:"absolute",top:-3,right:-4,width:14,height:14,borderRadius:"50%",background:Th.red,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 1px 4px ${Th.red}44`}}><span style={{fontSize:8,fontWeight:900,color:"#fff"}}>{tab.badge}</span></div>}
        </div>
        {tab.l&&<span style={{fontSize:9,fontWeight:isAct?800:500,color:isAct?Th.accent:Th.muted}}>{tab.l}</span>}
        {isAct&&<div style={{position:"absolute",bottom:0,width:20,height:3,borderRadius:"3px 3px 0 0",background:Th.accent}}/>}
      </button>);
    })}
  </div>);}

// ── APP ROOT ──────────────────────────────────────────────
function App(){
  const[state,setState]=useState("splash");const[user,setUser]=useState(null);const[tab,setTab]=useState("home");
  const[darkMode,setDarkMode]=useState(false);
  const[shifts,setShifts,shiftsOk]=useShared(SK.SH,SH_DEF);
  const[trocas,setTrocas,trocasOk]=useShared(SK.TR,[]);
  const[msgs,setMsgs,msgsOk]=useShared(SK.MSG,[]);
  const[users,setUsers,usersOk]=useShared(SK.US,USERS_DEFAULT);
  const[logEntries,setLog,logOk]=useShared(SK.LG,LOG_DEF);
  const ok=shiftsOk&&trocasOk&&msgsOk&&usersOk;
  const{ns,dm}=useNotifs(user?.id,trocas,msgs);
  const pendT=(trocas||[]).filter(t=>t.status==="pendente").length;
  const pendMsg=useMemo(()=>(!msgs||!user)?0:(msgs||[]).filter(m=>(m.para===user.id||m.para==="todos")&&m.de!==user.id).length,[msgs,user]);
  const isG=user?.role==="gestor";
  // Alert urgente
  const[alertaAtivo,sAlertaAtivo]=useState(null);
  useEffect(()=>{
    if(!logEntries||!user)return;
    const last=(logEntries||[]).filter(l=>l.tipo==="alerta").sort((a,b)=>b.id-b.id)[0];
    if(last&&!alertaAtivo&&last.de!==user.id)sAlertaAtivo(last.msg);
  },[logEntries]);
  const addLog=useCallback(async(entry)=>{await setLog(prev=>[{...entry,id:Date.now()},...(prev||[])].slice(0,500));},[setLog]);
  useEffect(()=>{_dk=darkMode;document.body.className=darkMode?"dark":"";document.body.style.background=darkMode?"#070d1a":"#0d2870";},[darkMode]);
  const login=u=>{setUser(u);setState("main");setTab("home");};
  const logout=()=>{setUser(null);setState("login");setTab("home");};
  const shared={user,shifts,setShifts,trocas,setTrocas,ok,setTab,darkMode,setDarkMode,users,addLog};
  const screens={
    home:isG?<HomeGestor {...shared} msgs={msgs}/>:<HomePlant {...shared}/>,
    escala:<Escala {...shared}/>,
    trocas:<Trocas {...shared}/>,
    financeiro:<Financeiro user={user||USERS_DEFAULT[0]} shifts={shifts} setShifts={setShifts} users={users}/>,
    msgs:<Mensagens user={user||USERS_DEFAULT[1]} msgs={msgs} setMsgs={setMsgs} users={users}/>,
    equipe:<Equipe user={user||USERS_DEFAULT[0]} shifts={shifts} users={users} setUsers={setUsers}/>,
    mais:<Mais user={user||USERS_DEFAULT[1]} onLogout={logout} darkMode={darkMode} setDarkMode={setDarkMode} shifts={shifts} users={users}/>,
  };
  return(<div style={{display:"flex",flexDirection:"column",height:"100dvh",overflow:"hidden",background:G().bg,position:"relative",maxWidth:430,margin:"0 auto",transition:"background .3s"}}>
    {state==="main"&&ns.length>0&&<NotifBanner n={ns[0]} dm={dm}/>}
    {state==="main"&&alertaAtivo&&<AlertaBanner msg={alertaAtivo} onDismiss={()=>sAlertaAtivo(null)}/>}
    {state==="main"&&user&&<>{screens[tab]||screens.home}<Nav active={tab} setActive={setTab} user={user} pendT={pendT} pendMsg={pendMsg}/></>}
    {state==="login"&&<Login onLogin={login} users={users}/>}
    {state==="splash"&&<Splash onDone={()=>setState("login")}/>}
  </div>);}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
