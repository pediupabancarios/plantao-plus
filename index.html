<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#1565C0"/>
<title>Plantão+ · UPA JP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Inter',sans-serif;}
body{background:#EEF2FF;overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
body.dark{background:#0A0F1E;}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
*{scrollbar-width:none;}::-webkit-scrollbar{display:none;}
input,select,textarea{font-size:16px!important;font-family:'Inter',sans-serif;}
input::placeholder,textarea::placeholder{color:#94a3b8;}
button{font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;cursor:pointer;}
button:active{opacity:.82;transform:scale(.97);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}
@keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes dn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
:root{
--bg:#EEF2FF;--card:#fff;--nav:#fff;--nb:rgba(0,0,0,.07);
--h1:#0F172A;--h2:#1E293B;--bd:#475569;--mu:#94A3B8;
--br:#E2E8F0;--in:#F8FAFC;--ib:#E2E8F0;
--bl:#1565C0;--bll:#1976D2;--blb:#E3F2FD;--bld:#0D47A1;
--gn:#16A34A;--gnb:#DCFCE7;
--pu:#7C3AED;--pub:#EDE9FE;
--rd:#DC2626;--rdb:#FEE2E2;
--or:#D97706;--orb:#FEF3C7;
--te:#0891B2;--teb:#E0F2FE;
--gd:#B45309;--gdb:#FEF9C3;
--pk:#DB2777;--pkb:#FCE7F3;
--gh:linear-gradient(160deg,#1565C0 0%,#0D47A1 55%,#1A237E 100%);
--sh:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
--sh2:0 4px 24px rgba(0,0,0,.1);
}
body.dark{
--bg:#0A0F1E;--card:#111827;--nav:#111827;--nb:rgba(255,255,255,.07);
--h1:#F1F5F9;--h2:#E2E8F0;--bd:#94A3B8;--mu:#475569;
--br:#1E293B;--in:#1E293B;--ib:#334155;
--bl:#3B82F6;--blb:rgba(59,130,246,.12);--bld:#2563FF;
--gn:#22C55E;--gnb:rgba(34,197,94,.12);
--pu:#A78BFA;--pub:rgba(167,139,250,.12);
--rd:#F87171;--rdb:rgba(248,113,113,.12);
--or:#FB923C;--orb:rgba(251,146,60,.12);
--te:#22D3EE;--teb:rgba(34,211,238,.12);
--gd:#FBBF24;--gdb:rgba(251,191,36,.12);
--pk:#F472B6;--pkb:rgba(244,114,182,.12);
--gh:linear-gradient(160deg,#1565C0 0%,#0D47A1 55%,#0A0F1E 100%);
--sh:0 2px 12px rgba(0,0,0,.4);--sh2:0 4px 24px rgba(0,0,0,.5);
}
.screen{flex:1;overflow-y:auto;padding-bottom:80px;animation:fi .18s ease;}
.hdr{padding:52px 16px 18px;background:var(--gh);position:relative;overflow:hidden;flex-shrink:0;}
.hdr-orb{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.07) 0%,transparent 70%);pointer-events:none;}
.card{background:var(--card);border-radius:18px;padding:14px 16px;box-shadow:var(--sh);border:1px solid var(--br);}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 16px;border:none;border-radius:12px;font-size:14px;font-weight:600;width:100%;margin-bottom:8px;transition:opacity .15s,transform .12s;}
.btn-blue{background:var(--bl);color:#fff;box-shadow:0 2px 12px rgba(21,101,192,.3);}
.btn-green{background:var(--gn);color:#fff;box-shadow:0 2px 12px rgba(22,163,74,.3);}
.btn-orange{background:var(--or);color:#fff;}
.btn-ghost{background:transparent;color:var(--bd);border:1.5px solid var(--br)!important;}
.btn-red{background:var(--rd);color:#fff;}
.inp{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--ib);outline:none;font-size:15px;font-family:'Inter',sans-serif;color:var(--h1);background:var(--in);transition:border-color .15s;}
.inp:focus{border-color:var(--bl);}
.label{display:block;font-size:11px;font-weight:600;color:var(--bd);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;}
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:28px;animation:up .28s cubic-bezier(.34,1,.64,1);}
.modal-bar{display:flex;justify-content:center;padding:8px 0 0;}
.modal-bar div{width:40px;height:4px;border-radius:4px;background:var(--br);}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--br);}
.modal-body{padding:16px 20px 0;}
.nav-bar{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--nav);border-top:1px solid var(--nb);display:flex;align-items:center;z-index:50;}
.nav-btn{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;position:relative;}
.nav-label{font-size:10px;font-weight:600;}
.nav-dot{position:absolute;bottom:0;width:24px;height:3px;border-radius:3px 3px 0 0;background:var(--bl);}
.sync{display:flex;align-items:center;gap:4px;}
.sync-dot{width:6px;height:6px;border-radius:50%;}
.tag-live{background:rgba(37,99,255,.12);color:#1565C0;}
.tag-done{background:var(--gnb);color:var(--gn);}
.tag-closed{background:var(--orb);color:var(--or);}
.tag-day{background:var(--gnb);color:var(--gn);}
.tag-night{background:var(--pub);color:var(--pu);}
.geo-card{background:var(--in);border-radius:14px;padding:13px;margin-bottom:12px;}
.row{display:flex;align-items:center;}
.col{display:flex;flex-direction:column;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.sep{display:flex;align-items:center;gap:8px;margin:10px 0 8px;}
.sep-line{height:1px;flex:1;}
.sep-text{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;}
.notif-banner{position:fixed;top:56px;left:10px;right:10px;z-index:500;background:var(--card);border-radius:16px;padding:12px 14px;box-shadow:0 8px 32px rgba(0,0,0,.15);display:flex;align-items:center;gap:10;animation:dn .3s ease;font-family:'Inter',sans-serif;}
</style>
</head>

<script>
// Storage
const ST={
  get(k){try{const v=localStorage.getItem('sh_'+k);return v?JSON.parse(v):null;}catch{return null;}},
  set(k,v){try{localStorage.setItem('sh_'+k,JSON.stringify(v));}catch{}},
  getLo(k){try{const v=localStorage.getItem('lo_'+k);return v?JSON.parse(v):null;}catch{return null;}},

// Sync
class Live{
  constructor(){this._cb={};this._iv={};}
  watch(k,cb,ms=2500){
    this._cb[k]=cb;
    this._iv[k]=setInterval(()=>{const v=ST.get(k);if(v!==null){const s=JSON.stringify(v);if(s!==this._last?.[k]){this._last=this._last||{};this._last[k]=s;cb(v);}}},ms);
  }
  unwatch(k){clearInterval(this._iv[k]);}
  write(k,v){ST.set(k,v);this._last=this._last||{};this._last[k]=JSON.stringify(v);}
}
const LV=new Live();
</script>
