function useLS(key,def){
  const[v,sV]=useState(()=>ST.get(key)||def);
  const[ok,sOk]=useState(false);
  const last=useRef('');
  useEffect(()=>{
    const cur=ST.get(key);
    if(cur!==null){sV(cur);last.current=JSON.stringify(cur);}
    else{ST.set(key,def);last.current=JSON.stringify(def);}
    sOk(true);
    const iv=setInterval(()=>{
      const n=ST.get(key);
      if(n!==null){const s=JSON.stringify(n);if(s!==last.current){sV(n);last.current=s;}}
    },2500);
    return()=>clearInterval(iv);
  },[]);

  },[key,v]);

  },[day,time]);
  if(!l)return null;
  return<span className="chip" style={{background:tp==='D'?'var(--gnb)':'var(--pub)',color:tp==='D'?'var(--gn)':'var(--pu)'}}><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{marginRight:3}}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>em {l}</span>;
}

// ── ESCALA ────────────────────────────
function Escala({user,shifts,setShifts,trocas,ok,users,addLog,getP}){
  const aU=users||U0;const isG=user.role==='g';
  const[vm,sVm]=useState(4);const[vy,sVy]=useState(2026);const[sel,sSel]=useState(26);
  const[det,sDet]=useState(null);const[showAdd,sAdd]=useState(false);
  const[showExp,sExp]=useState(false);const[showRel,sRel]=useState(false);
  const[fm,sFm]=useState({p1:'',p2:'',t:'07:00',te:'19:00',tp:'D',obs:'',rec:false});
  const{geo,check}=useGeo();
  const ps=aU.filter(u=>u.role==='p'&&u.ativo!==false);
  const fDow=new Date(vy,vm,1).getDay();const dim=new Date(vy,vm+1,0).getDate();const dip=new Date(vy,vm,0).getDate();
  const cells=[];for(let i=0;i<fDow;i++)cells.push({d:dip-fDow+1+i,o:true});for(let d=1;d<=dim;d++)cells.push({d,o:false});while(cells.length<42)cells.push({d:cells.length-dim-fDow+1,o:true});
  const isCM=vy===2026&&vm===4;const ds=sel?(shifts[sel]||[]):[];
  const prevM=()=>{if(vm===0){sVm(11);sVy(y=>y-1);}else sVm(m=>m-1);sSel(null);};
  const nextM=()=>{if(vm===11){sVm(0);sVy(y=>y+1);}else sVm(m=>m+1);sSel(null);};

  // GESTOR: iniciar/fechar de qualquer lugar
  const iniciar=(sId)=>{setShifts(p=>{const u=JSON.parse(JSON.stringify(p));const s=u[sel]?.find(x=>x.id===sId);if(s){s.st='live';s.inicEm=nowFull();}return u;});addLog({tipo:'init',id:sId,hora:nowFull()});sDet(null);};
  const fechar=(sId)=>{setShifts(p=>{const u=JSON.parse(JSON.stringify(p));const s=u[sel]?.find(x=>x.id===sId);if(s){s.ps.forEach(id=>{if(!s.sa[id])s.sa[id]=nowHM();});s.st='closed';s.fechEm=nowFull();}return u;});addLog({tipo:'close',id:sId,hora:nowFull()});sDet(null);};
  // PLANTONISTA: entrada/saída com GPS
  const regE=(sId,uid)=>{setShifts(p=>{const u=JSON.parse(JSON.stringify(p));const s=u[sel]?.find(x=>x.id===sId);if(s){s.en={...s.en,[uid]:nowHM()};if(s.ps.every(id=>s.en[id]))s.st='live';}return u;});addLog({tipo:'in',uid,hora:nowFull()});sDet(null);};
  const regS=(sId,uid)=>{setShifts(p=>{const u=JSON.parse(JSON.stringify(p));const s=u[sel]?.find(x=>x.id===sId);if(s){s.sa={...s.sa,[uid]:nowHM()};if(s.ps.every(id=>s.sa[id]))s.st='done';}return u;});addLog({tipo:'out',uid,hora:nowFull()});sDet(null);};
  const delS=(id)=>{setShifts(p=>{const u={...p};u[sel]=(u[sel]||[]).filter(s=>s.id!==id);return u;});sDet(null);};
  const addS=()=>{
    if(!fm.p1||!fm.p2||fm.p1===fm.p2)return;
    const base={ps:[+fm.p1,+fm.p2],t:fm.t,te:fm.te,tp:fm.tp,st:'sched',en:{},sa:{},obs:fm.obs,pg:{},conf:{}};
    if(fm.rec){let c=sel;while(c<=dim){setShifts(p=>{const u=JSON.parse(JSON.stringify(p));if(!u[c])u[c]=[];if(!u[c].some(s=>s.tp===fm.tp&&s.t===fm.t))u[c].push({...base,id:Date.now()+c});return u;});c+=7;}
    }else setShifts(p=>({...p,[sel]:[...(p[sel]||[]),{...base,id:Date.now()}]}));
    sAdd(false);sFm({p1:'',p2:'',t:'07:00',te:'19:00',tp:'D',obs:'',rec:false});
  };

  const sCard=(s)=>{
    const bc=s.st==='live'?'var(--bl)':s.st==='closed'?'var(--or)':s.tp==='D'?'var(--gn)':'var(--pu)';
    const p2=s.ps.map(id=>gU(aU,id)).filter(Boolean);const myS=s.ps.includes(user.id);
    const hasTr=(trocas||[]).some(t=>(t.shId===s.id||t.shDst===s.id)&&(t.st==='pend'||t.st==='wait'));
    return<div key={s.id} onClick={()=>sDet(s)} className="card" style={{marginBottom:10,cursor:'pointer',borderLeft:`5px solid ${bc}`,boxShadow:myS?'0 6px 24px rgba(21,101,192,.15)':'var(--sh)'}}>
      <div className="row" style={{justifyContent:'space-between',marginBottom:10}}>
        <span style={{fontSize:14,fontWeight:700,color:bc,letterSpacing:'-.3px'}}>{s.tp==='D'?'☀️':'🌙'} {s.t}–{s.te}</span>
        <div className="row" style={{gap:5}}>
          {myS&&<span className="chip" style={{background:'var(--blb)',color:'var(--bl)'}}>Meu turno</span>}
          {hasTr&&<span className="chip" style={{background:'var(--pub)',color:'var(--pu)'}}>🔄</span>}
          <Chip st={s.st} tp={s.tp}/>
        </div>
      </div>
      <div className="row" style={{gap:7,flexWrap:'wrap'}}>{p2.map(p=><div key={p.id} className="row" style={{gap:7,background:p.id===user.id?`${user.color}10`:'var(--bg)',borderRadius:10,padding:'5px 10px',border:`1px solid ${p.id===user.id?user.color+'33':'var(--br)'}`}}>
        <Av id={p.id} name={p.nome} size={22} ini={p.ini} color={p.color} getP={getP}/>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:p.id===user.id?user.color:'var(--h1)'}}>{p.nome.replace(/Dr\. |Dra\. /,'').split(' ').slice(0,2).join(' ')}</div>
          {s.en[p.id]&&<div style={{fontSize:9,color:'var(--gn)',fontWeight:600}}>✓ {s.en[p.id]}</div>}
          {s.sa[p.id]&&<div style={{fontSize:9,color:'var(--mu)',fontWeight:600}}>↗ {s.sa[p.id]}</div>}
        </div>
      </div>)}</div>
      {/* Botões iniciar/fechar só para o gestor direto no card */}
      {isG&&s.st==='sched'&&<div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--br)'}}>
        <button className="btn btn-blue" style={{marginBottom:0,fontSize:12}} onClick={e=>{e.stopPropagation();iniciar(s.id);}}>▶ Iniciar plantão</button>
      </div>}
      {isG&&s.st==='live'&&<div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--br)'}}>
        <button className="btn btn-orange" style={{marginBottom:0,fontSize:12}} onClick={e=>{e.stopPropagation();fechar(s.id);}}>⏸ Fechar plantão</button>
      </div>}
      {s.obs&&<div style={{fontSize:11,color:'var(--bd)',fontStyle:'italic',marginTop:6,paddingTop:6,borderTop:'1px solid var(--br)'}}>📝 {s.obs}</div>}
    </div>;
  };

  return<div className="screen">
    <div className="hdr">
      <div className="row" style={{justifyContent:'space-between',marginBottom:10}}>
        <div><div className="row" style={{gap:7,marginBottom:3}}><span style={{fontSize:10,color:'rgba(255,255,255,.5)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Plantão+</span><SyncDot ok={ok}/></div><div style={{fontSize:20,fontWeight:700,color:'#fff',letterSpacing:'-.5px'}}>Escala · {MN[vm]}</div></div>
        <div className="row" style={{gap:6}}>
          <button onClick={()=>sExp(true)} style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',borderRadius:10,padding:'7px 11px',color:'#fff',fontSize:11,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>📤 Exp.</button>
          {isG&&<button onClick={()=>sRel(true)} style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',borderRadius:10,padding:'7px 11px',color:'#fff',fontSize:11,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>📊 Rel.</button>}
          {isG&&sel&&<button onClick={()=>sAdd(true)} style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.25)',borderRadius:10,padding:'7px 12px',color:'#fff',fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>+ Novo</button>}
        </div>
      </div>
    </div>
    {/* Calendar */}
    <div style={{margin:'12px 14px 0',background:'var(--card)',borderRadius:20,boxShadow:'var(--sh)'}}>
      <div className="row" style={{justifyContent:'space-between',padding:'14px 18px 4px'}}>

    </Modal>}

    {showExp&&<ExportModal shifts={shifts} vm={vm} vy={vy} users={aU} close={()=>sExp(false)}/>}

  </div>;
}

// ── DETAIL MODAL ──────────────────────

          </div>
          <div className="grid2" style={{gap:5}}>
            <div style={{background:s.en[p.id]?'var(--gnb)':'var(--bg)',borderRadius:8,padding:'5px 7px'}}><div style={{fontSize:8,fontWeight:600,color:s.en[p.id]?'var(--gn)':'var(--mu)',textTransform:'uppercase'}}>Entrada</div><div style={{fontSize:10,fontWeight:700,color:s.en[p.id]?'var(--gn)':'var(--mu)'}}>{s.en[p.id]||'—'}</div></div>
            <div style={{background:s.sa[p.id]?'var(--bg)':'var(--orb)',borderRadius:8,padding:'5px 7px'}}><div style={{fontSize:8,fontWeight:600,color:s.sa[p.id]?'var(--mu)':'var(--or)',textTransform:'uppercase'}}>Saída</div><div style={{fontSize:10,fontWeight:700,color:s.sa[p.id]?'var(--h1)':'var(--or)'}}>{s.sa[p.id]||'—'}</div></div>

// ── EXPORT MODAL ──────────────────────
function ExportModal({shifts,vm,vy,users,close}){
  const aU=users||U0;const[fmt,sFmt]=useState('wa');const[copied,sCopied]=useState(false);
  const build=()=>{
    const h=fmt==='wa'?`📋 *ESCALA PEDIATRIA UPA JP*\n*${MN[vm].toUpperCase()} ${vy}*\n🏥 Dr. Rodrigo Cahuana · CRM 11707/PB\n${'─'.repeat(28)}\n`:`ESCALA PEDIATRIA UPA JP — ${MN[vm].toUpperCase()} ${vy}\n${'='.repeat(36)}\n`;
    let b='';for(const day of Object.keys(shifts||{}).map(Number).sort((a,c)=>a-c)){const ss=shifts[day];if(!ss?.length)continue;const d=new Date(vy,vm,day);b+=fmt==='wa'?`\n*${String(day).padStart(2,'0')}/${String(vm+1).padStart(2,'0')} (${DS[d.getDay()]})*\n`:`\n${String(day).padStart(2,'0')}/${String(vm+1).padStart(2,'0')} (${DS[d.getDay()]})\n`;for(const s of ss){const nm=s.ps.map(id=>gU(aU,id)).filter(Boolean).map(p=>p.nome.replace(/Dr\. |Dra\. /,'').split(' ').slice(0,2).join(' ')).join(' + ');const ic=s.tp==='D'?'☀️':'🌙';const st=s.st==='done'?'✓':s.st==='live'?'●':s.st==='closed'?'⚠':'○';b+=`  ${ic} ${s.t}–${s.te}  ${st} ${nm}\n`;}}
    return h+b+`\n${'─'.repeat(28)}\n_Plantão+ v8 · ${new Date().toLocaleDateString('pt-BR')}_`;
  };
  const txt=build();
  const copy=()=>{navigator.clipboard?.writeText(txt);sCopied(true);setTimeout(()=>sCopied(false),2500);};
  return<Modal title="📤 Exportar Escala" sub={`${MN[vm]} ${vy}`} close={close}>
    <div className="grid2" style={{marginBottom:14}}>
      {[{v:'wa',l:'💬 WhatsApp'},{v:'txt',l:'📄 Texto simples'}].map(f=><button key={f.v} onClick={()=>sFmt(f.v)} style={{padding:'11px 8px',borderRadius:12,border:`2px solid ${fmt===f.v?'var(--bl)':'var(--br)'}`,background:fmt===f.v?'var(--blb)':'var(--bg)',cursor:'pointer',fontWeight:700,fontSize:12,color:fmt===f.v?'var(--bl)':'var(--h1)',transition:'all .15s'}}>{f.l}</button>)}
    </div>
    <div style={{background:'var(--bg)',borderRadius:14,padding:'12px 14px',maxHeight:180,overflowY:'auto',marginBottom:14,border:'1px solid var(--br)'}}>
      <pre style={{fontSize:11,color:'var(--h1)',fontFamily:'monospace',whiteSpace:'pre-wrap',wordBreak:'break-word',margin:0,lineHeight:1.7}}>{txt}</pre>
    </div>
    <button className="btn" style={{background:'#25D366',color:'#fff',marginBottom:8}} onClick={()=>window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`,'_blank')}>💬 Enviar pelo WhatsApp</button>
    <button className="btn" style={{background:copied?'var(--gnb)':'var(--bg)',color:copied?'var(--gn)':'var(--bd)',border:`1.5px solid ${copied?'var(--gn)':'var(--br)'}`,transition:'all .2s',marginBottom:0}} onClick={copy}>{copied?'✓ Copiado!':'📋 Copiar texto'}</button>
  </Modal>;
}

// ── RELATORIO MODAL ───────────────────
function RelatModal({shifts,users,close}){
  const aU=users||U0;const ps=aU.filter(u=>u.role==='p'&&u.ativo!==false);
  const all=useMemo(()=>Object.entries(shifts||{}).flatMap(([d,ss])=>ss.map(s=>({...s,day:+d}))),[shifts]);
  const concl=all.filter(s=>s.st==='done'||s.st==='closed');
  const em=all.filter(s=>s.st==='live').length,ag=all.filter(s=>s.st==='sched').length;
  const dias=new Set(concl.map(s=>s.day)).size;const cob=Math.round(dias/31*100);
  const stats=useMemo(()=>ps.map(u=>{const m=concl.filter(s=>s.ps.includes(u.id));let tot=0;m.forEach((_,i)=>{tot+=calcVal(i+1);});return{...u,count:m.length,horas:m.length*12,tot,D:m.filter(s=>s.tp==='D').length,N:m.filter(s=>s.tp==='N').length};}).filter(u=>u.count>0).sort((a,b)=>b.count-a.count),[concl,ps]);
  const totFin=stats.reduce((a,u)=>a+u.tot,0);
  const[copied,sCopied]=useState(false);
  const buildTxt=()=>[`📊 RELATÓRIO DE PLANTÕES — Maio 2026`,'─'.repeat(30),`Hospital: UPA Pediátrica JP`,`Gestor: Dr. Rodrigo Cahuana · CRM 11707/PB`,``,`📅 RESUMO GERAL`,`• Plantões concluídos: ${concl.length}`,`• Horas trabalhadas: ${concl.length*12}h`,`• Dias cobertos: ${dias}/31 (${cob}%)`,`• Diurnos: ${concl.filter(s=>s.tp==='D').length} | Noturnos: ${concl.filter(s=>s.tp==='N').length}`,`• Ao vivo agora: ${em} | Agendados: ${ag}`,``,`💰 FINANCEIRO`,`• Total estimado: ${fR(totFin)}`,`• Plantões 1–6: R$ ${getCfg().v1},00 | 7+: R$ ${getCfg().v2},00`,``,`👥 POR PLANTONISTA`,...stats.map(u=>`• ${u.nome.replace(/Dr\. |Dra\. /,'')}: ${u.count} plt (${u.horas}h) → ${fR(u.tot)} [☀️${u.D} 🌙${u.N}]`),``,`${'─'.repeat(30)}`,`Plantão+ v8 · ${new Date().toLocaleDateString('pt-BR')}`].join('\n');
  const txt=buildTxt();
  const copy=()=>{navigator.clipboard?.writeText(txt);sCopied(true);setTimeout(()=>sCopied(false),2500);};
  return<Modal title="📊 Relatório de Plantões" sub="Maio 2026 · Pediatria UPA JP" close={close}>
    <div className="grid2" style={{marginBottom:12}}>
      {[{l:'Concluídos',v:concl.length,c:'var(--gn)',bg:'var(--gnb)',i:'✅'},{l:'Horas',v:`${concl.length*12}h`,c:'var(--bl)',bg:'var(--blb)',i:'⏱'},{l:'Dias cobertos',v:`${dias}/31`,c:'var(--pu)',bg:'var(--pub)',i:'📅'},{l:'Cobertura',v:`${cob}%`,c:cob>=90?'var(--gn)':'var(--or)',bg:cob>=90?'var(--gnb)':'var(--orb)',i:'📊'}].map(x=>(
        <div key={x.l} style={{background:x.bg,borderRadius:14,padding:'12px 13px',border:`1px solid ${x.c}22`}}>
          <div style={{fontSize:16,marginBottom:4}}>{x.i}</div>
          <div style={{fontSize:18,fontWeight:800,color:x.c,letterSpacing:'-.5px'}}>{x.v}</div>
          <div style={{fontSize:10,color:'var(--mu)',marginTop:3,fontWeight:500}}>{x.l}</div>
        </div>
      ))}
    </div>
    <div className="grid3" style={{marginBottom:12}}>
      {[{l:'Diurnos',v:concl.filter(s=>s.tp==='D').length,c:'var(--gn)',i:'☀️'},{l:'Noturnos',v:concl.filter(s=>s.tp==='N').length,c:'var(--pu)',i:'🌙'},{l:'Ao vivo',v:em,c:'var(--bl)',i:'●'}].map(x=>(
        <div key={x.l} className="card" style={{textAlign:'center',padding:'10px'}}>
          <div style={{fontSize:15,marginBottom:3}}>{x.i}</div>
          <div style={{fontSize:20,fontWeight:800,color:x.c,letterSpacing:'-.5px'}}>{x.v}</div>
          <div style={{fontSize:10,color:'var(--mu)',marginTop:2}}>{x.l}</div>
        </div>
      ))}
    </div>
    <div className="card" style={{marginBottom:12}}>
      <div className="row" style={{justifyContent:'space-between',marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--h1)'}}>Cobertura do mês</span>
        <span style={{fontSize:12,fontWeight:700,color:cob>=90?'var(--gn)':'var(--or)'}}>{cob}%</span>
      </div>
      <div style={{height:8,background:'var(--bg)',borderRadius:20,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${cob}%`,background:cob>=90?'var(--gn)':'var(--or)',borderRadius:20,transition:'width .8s ease'}}/>
      </div>
      <div style={{fontSize:10,color:'var(--mu)',marginTop:5}}>{dias} de 31 dias com plantão registrado</div>
    </div>
    <div style={{marginBottom:12}}>

// ── TROCAS ────────────────────────────
function Trocas({user,shifts,setShifts,trocas,setTrocas,ok,users,getP}){
  const aU=users||U0;const[tab,sTab]=useState('pend');const[nova,sNova]=useState(false);const isG=user.role==='g';
  const mine=isG?trocas:(trocas||[]).filter(t=>t.dono===user.id||t.rec===user.id);
  const pend=mine.filter(t=>t.st==='pend'||t.st==='wait'),hist=mine.filter(t=>t.st!=='pend'&&t.st!=='wait');
  const list=tab==='pend'?pend:hist;

  const aceitar=t=>{
    if(t.tipo==='rep'){const nv=JSON.parse(JSON.stringify(shifts));const s=nv[t.dOrig]?.find(x=>x.id===t.shId);if(s)s.ps=s.ps.map(id=>id===t.dono?t.rec:id);setShifts(nv);setTrocas(p=>p.map(x=>x.id===t.id?{...x,st:'ok',res:nowFull()}:x));}
    else{setTrocas(p=>p.map(x=>x.id===t.id?{...x,st:'wait',res:nowFull()}:x));}
  };

  const recusar=id=>setTrocas(p=>p.map(t=>t.id===id?{...t,st:'no',res:nowFull()}:t));
  return<div className="screen">
    <div className="hdr">
      <div className="row" style={{justifyContent:'space-between',marginBottom:12}}>
        <div><div className="row" style={{gap:7,marginBottom:3}}><span style={{fontSize:10,color:'rgba(255,255,255,.5)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Plantão+</span><SyncDot ok={ok}/></div><div style={{fontSize:20,fontWeight:700,color:'#fff',letterSpacing:'-.5px'}}>Trocas e Repasses</div><div style={{fontSize:11,color:'rgba(255,255,255,.55)',marginTop:3}}>Repasses: direto · Trocas: via Dr. Rodrigo</div></div>
        <button onClick={()=>sNova(true)} style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.25)',borderRadius:10,padding:'8px 14px',color:'#fff',fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:5}}>+ Nova</button>
      </div>
      <div className="grid2">
        {[{v:'pend',l:`⏳ Pendentes (${pend.length})`},{v:'hist',l:`📂 Histórico (${hist.length})`}].map(t=><button key={t.v} onClick={()=>sTab(t.v)} style={{padding:'8px',borderRadius:10,border:'none',background:tab===t.v?'rgba(255,255,255,.22)':'rgba(255,255,255,.07)',color:tab===t.v?'#fff':'rgba(255,255,255,.5)',fontWeight:600,fontSize:11}}>{t.l}</button>)}
      </div>
    </div>
    <div style={{padding:'14px 14px 0'}}>
      {list.length===0&&<div style={{textAlign:'center',padding:'32px',color:'var(--mu)'}}>
        <div style={{fontSize:32,marginBottom:10}}>{tab==='pend'?'🎉':'📭'}</div>
        <div style={{fontSize:14,fontWeight:600,color:'var(--bd)'}}>{tab==='pend'?'Nenhuma pendência!':'Histórico vazio'}</div>
      </div>}
      {list.map(t=>{
        const d=gU(aU,t.dono),r=gU(aU,t.rec),sO=gS(t.shId),sD=t.shDst?gS(t.shDst):null;
        const isPend=t.st==='pend',isWait=t.st==='wait';
        const bc=t.tipo==='tr'?'var(--pu)':'var(--te)';
        const canRepRec=!isG&&t.tipo==='rep'&&isPend&&t.rec===user.id;
        const canTrG=isG&&t.tipo==='tr'&&(isPend||isWait);
        return<div key={t.id} className="card" style={{marginBottom:12,border:`1.5px solid ${isPend||isWait?bc:'var(--br)'}`}}>
          <div className="row" style={{justifyContent:'space-between',marginBottom:10,background:t.tipo==='tr'?'var(--pub)':'var(--teb)',borderRadius:10,padding:'8px 12px'}}>
            <div className="row" style={{gap:6}}><span style={{fontSize:12}}>{t.tipo==='tr'?'🔄':'➡️'}</span><span style={{fontSize:12,fontWeight:700,color:bc}}>{t.tipo==='tr'?'Troca':'Repasse'}</span></div>
            <div className="row" style={{gap:5}}>
              {isPend&&<span className="chip" style={{background:'var(--orb)',color:'var(--or)'}}>⏳</span>}
              {isWait&&<span className="chip" style={{background:'var(--pub)',color:'var(--pu)'}}>👨‍⚕️ Aguarda Dr. Rodrigo</span>}
              {t.st==='ok'&&<span className="chip" style={{background:'var(--gnb)',color:'var(--gn)'}}>✓ Aceita</span>}
              {t.st==='no'&&<span className="chip" style={{background:'var(--rdb)',color:'var(--rd)'}}>✗ Recusada</span>}
              <span style={{fontSize:9,color:'var(--mu)'}}>{t.criado}</span>
            </div>
          </div>
          <div className={t.tipo==='tr'?'grid2':''} style={{gap:8,marginBottom:10}}>
            <div style={{background:'var(--bg)',borderRadius:10,padding:'9px 11px'}}>
              <div style={{fontSize:8,fontWeight:600,color:'var(--mu)',textTransform:'uppercase',marginBottom:4}}>De</div>
              <div className="row" style={{gap:6,marginBottom:4}}><Av id={d?.id} name={d?.nome||'?'} size={20} ini={d?.ini} color={d?.color} getP={getP}/><span style={{fontSize:11,fontWeight:600,color:'var(--h1)'}}>{d?.nome.replace(/Dr\. |Dra\. /,'').split(' ').slice(0,2).join(' ')}</span></div>
              <div style={{fontSize:10,fontWeight:600,color:'var(--h1)'}}>{String(t.dOrig).padStart(2,'0')}/05 · {sO?.t}–{sO?.te}</div>
            </div>
            {t.tipo==='tr'&&<div style={{background:'var(--bg)',borderRadius:10,padding:'9px 11px'}}>
              <div style={{fontSize:8,fontWeight:600,color:'var(--mu)',textTransform:'uppercase',marginBottom:4}}>Com</div>
              <div className="row" style={{gap:6,marginBottom:4}}><Av id={r?.id} name={r?.nome||'?'} size={20} ini={r?.ini} color={r?.color} getP={getP}/><span style={{fontSize:11,fontWeight:600,color:'var(--h1)'}}>{r?.nome.replace(/Dr\. |Dra\. /,'').split(' ').slice(0,2).join(' ')}</span></div>
              <div style={{fontSize:10,fontWeight:600,color:'var(--h1)'}}>{String(t.dDest||0).padStart(2,'0')}/05 · {sD?.t}–{sD?.te}</div>
            </div>}
            {t.tipo==='rep'&&<div style={{background:'var(--teb)',borderRadius:10,padding:'9px 11px',display:'flex',alignItems:'center',gap:8}}>
              <span>➡️</span><div><div style={{fontSize:8,fontWeight:600,color:'var(--te)',textTransform:'uppercase',marginBottom:4}}>Assume</div><div className="row" style={{gap:4}}><Av id={r?.id} name={r?.nome||'?'} size={18} ini={r?.ini} color={r?.color} getP={getP}/><span style={{fontSize:11,fontWeight:600,color:'var(--te)'}}>{r?.nome.replace(/Dr\. |Dra\. /,'').split(' ').slice(0,2).join(' ')}</span></div></div>
            </div>}
          </div>
          {t.motivo&&<div style={{background:'var(--bg)',borderRadius:8,padding:'5px 9px',marginBottom:10,border:'1px solid var(--br)'}}><span style={{fontSize:9,color:'var(--mu)',fontWeight:600}}>Motivo: </span><span style={{fontSize:9,color:'var(--bd)',fontStyle:'italic'}}>"{t.motivo}"</span></div>}
          {canRepRec&&<div className="grid2" style={{gap:7}}><button className="btn btn-blue" style={{marginBottom:0,fontSize:12}} onClick={()=>aceitar(t)}>✓ Aceitar repasse</button><button className="btn" style={{marginBottom:0,fontSize:12,background:'var(--rdb)',color:'var(--rd)',border:'none'}} onClick={()=>recusar(t.id)}>✗ Recusar</button></div>}
          {canTrG&&<div className="grid2" style={{gap:7}}><button className="btn btn-green" style={{marginBottom:0,fontSize:12}} onClick={()=>aprovarG(t)}>✓ Aprovar troca</button><button className="btn" style={{marginBottom:0,fontSize:12,background:'var(--rdb)',color:'var(--rd)',border:'none'}} onClick={()=>recusar(t.id)}>✗ Recusar</button></div>}
          {!isG&&isPend&&t.dono===user.id&&t.tipo==='tr'&&<div style={{fontSize:11,color:'var(--mu)',textAlign:'center',padding:'6px',background:'var(--bg)',borderRadius:8}}>⏳ Aguardando Dr. Rodrigo aprovar</div>}
          {t.res&&<div style={{fontSize:9,color:'var(--mu)',textAlign:'right',marginTop:6}}>{t.st==='ok'?'✓ Aceita':'✗ Recusada'} · {t.res}</div>}
        </div>;
      })}
    </div>
    {nova&&<NovaTroca user={user} shifts={shifts} setTrocas={setTrocas} users={aU} getP={getP} close={()=>sNova(false)}/>}
  </div>;
}

function NovaTroca({user,shifts,setTrocas,users,getP,close}){
  const aU=users||U0;const[tipo,sTipo]=useState('rep');const[dono,sDono]=useState(String(user.role==='p'?user.id:''));const[rec,sRec]=useState('');const[shO,sSO]=useState('');const[shD,sSD]=useState('');const[motivo,sMot]=useState('');
  const isG=user.role==='g';const ps=aU.filter(u=>u.role==='p'&&u.ativo!==false);
  const all=Object.entries(shifts||{}).flatMap(([d,ss])=>ss.map(s=>({...s,day:+d})));
  const sOf=id=>all.filter(s=>s.ps.includes(+id)&&s.st==='sched');
  const fS=s=>{const d=new Date(2026,4,s.day);return`${String(s.day).padStart(2,'0')}/05 (${DS[d.getDay()]}) · ${s.t}–${s.te}`;};
  const gD=id=>all.find(s=>s.id===+id)?.day;
  const ok2=dono&&rec&&shO&&(tipo==='rep'||shD);
  const sub=()=>{if(!ok2)return;setTrocas(p=>[{id:Date.now(),tipo,shId:+shO,dOrig:gD(shO),shDst:tipo==='tr'?+shD:null,dDest:tipo==='tr'?gD(shD):null,dono:+dono,rec:+rec,motivo,st:'pend',criado:nowFull()},...p]);close();};
  return<Modal title="Nova Troca / Repasse" sub="Repasse: receptor aprova · Troca: Dr. Rodrigo aprova" close={close}>
    <div className="grid2" style={{marginBottom:14}}>
      {[{v:'rep',l:'➡️ Repasse',d:'Receptor aprova direto'},{v:'tr',l:'🔄 Troca',d:'Dr. Rodrigo aprova'}].map(f=><button key={f.v} onClick={()=>sTipo(f.v)} style={{padding:'11px 6px',borderRadius:12,border:`2px solid ${tipo===f.v?'var(--bl)':'var(--br)'}`,background:tipo===f.v?'var(--blb)':'var(--bg)',cursor:'pointer',textAlign:'center',transition:'all .15s'}}>
        <div style={{fontSize:14,marginBottom:2}}>{f.v==='rep'?'➡️':'🔄'}</div>
        <div style={{fontSize:12,fontWeight:700,color:tipo===f.v?'var(--bl)':'var(--h1)'}}>{f.l}</div>
        <div style={{fontSize:9,color:'var(--mu)',marginTop:1}}>{f.d}</div>
      </button>)}
    </div>
    {isG&&<Sel label="Quem solicita" val={dono} set={sDono} opts={[{v:'',l:'Selecionar…'},...ps.map(p=>({v:p.id,l:p.nome}))]}/>}
    {!isG&&<div className="row" style={{gap:9,marginBottom:12,background:`${user.color}10`,borderRadius:11,padding:'10px 12px',border:`1px solid ${user.color}33`}}><Av id={user.id} name={user.nome} size={28} ini={user.ini} color={user.color} getP={getP}/><div><div style={{fontSize:12,fontWeight:700,color:user.color}}>{user.nome}</div><div style={{fontSize:9,color:'var(--mu)',marginTop:1}}>Solicitante</div></div></div>}
    {dono&&<Sel label="Turno a ceder" val={shO} set={sSO} opts={[{v:'',l:'Selecionar turno…'},...sOf(dono).map(s=>({v:s.id,l:fS(s)}))]}/>}
    <Sel label={tipo==='tr'?'Quem troca':'Quem assume'} val={rec} set={sRec} opts={[{v:'',l:'Selecionar…'},...ps.filter(p=>String(p.id)!==String(dono)).map(p=>({v:p.id,l:p.nome}))]}/>
    {tipo==='tr'&&rec&&<Sel label="Turno do receptor" val={shD} set={sSD} opts={[{v:'',l:'Selecionar…'},...sOf(rec).map(s=>({v:s.id,l:fS(s)}))]}/>}
    <Fld label="Motivo (opcional)" val={motivo} set={sMot} ph="Ex: Compromisso médico…"/>
    <div style={{background:tipo==='rep'?'var(--teb)':'var(--pub)',borderRadius:10,padding:'8px 11px',marginBottom:12,border:`1px solid ${tipo==='rep'?'var(--te)':'var(--pu)'}22`,fontSize:10,color:tipo==='rep'?'#0E7490':'#6D28D9',lineHeight:1.5}}>
      {tipo==='rep'?'➡️ Repasse direto: o receptor pode aceitar ou recusar sem o gestor.':'🔄 Troca: Dr. Rodrigo precisará aprovar para valer.'}
    </div>
    <button className="btn btn-blue" onClick={sub} disabled={!ok2} style={{opacity:ok2?1:.5}}>{tipo==='rep'?'➡️ Enviar Repasse':'🔄 Enviar Troca'}</button>
  </Modal>;
}

          <span style={{fontSize:9,fontWeight:600,color:'#fff'}}>{isG?'DR. RODRIGO · GESTOR':'PLANTONISTA'}</span>
        </div>
        <div className="row" style={{gap:4,background:'rgba(74,222,128,.18)',borderRadius:20,padding:'4px 11px'}}>
          <div style={{width:5,height:5,borderRadius:'50%',background:'#4ade80',animation:'pulse 1.5s infinite'}}/>
          <span style={{fontSize:9,fontWeight:600,color:'#4ade80'}}>TEMPO REAL</span>
        </div>
      </div>
    </div>
    <div style={{padding:'14px 14px 0'}}>
      {/* Resumo financeiro */}
      {sal.count>0&&<div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:'var(--h1)',marginBottom:10}}>💰 Resumo financeiro</div>
        <div className="grid2">
          {[{l:'Total ganho',v:fR(sal.tot),c:'var(--gn)'},{l:`Próximo #${sal.nextN}`,v:fR(sal.next),c:sal.nextN>getCfg().lim?'var(--gd)':'var(--gn)'},{l:'Horas trabalhadas',v:`${sal.count*12}h`,c:'var(--bl)'},{l:'Plantões realizados',v:sal.count,c:'var(--pu)'}].map(i=>(
            <div key={i.l} style={{background:'var(--bg)',borderRadius:10,padding:'9px 10px'}}><div style={{fontSize:9,color:'var(--mu)',marginBottom:3,fontWeight:500}}>{i.l}</div><div style={{fontSize:14,fontWeight:700,color:i.c}}>{i.v}</div></div>
          ))}
        </div>
      </div>}
      {/* Tabela salarial */}
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--mu)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Tabela de valores</div>
        {[{n:`Plantões 1 a ${getCfg().lim}`,v:getCfg().v1,c:'var(--gn)',bg:'var(--gnb)'},{n:`A partir do ${getCfg().lim+1}º`,v:getCfg().v2,c:'var(--gd)',bg:'var(--gdb)'}].map(r=><div key={r.n} className="row" style={{justifyContent:'space-between',padding:'8px 10px',background:r.bg,borderRadius:9,marginBottom:5,border:`1px solid ${r.c}22`}}><span style={{fontSize:11,fontWeight:600,color:r.c}}>{r.n}</span><span style={{fontSize:14,fontWeight:800,color:r.c}}>{fR(r.v)}</span></div>)}
      </div>
      {/* Credenciais */}
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--mu)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Credenciais</div>
        {[{l:'Login',v:user.login,m:true},{l:'E-mail',v:user.email}].map(i=><div key={i.l} className="row" style={{justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--br)'}}><span style={{fontSize:12,color:'var(--bd)',fontWeight:500}}>{i.l}</span><span style={{fontSize:12,fontWeight:600,color:'var(--h1)',fontFamily:i.m?'monospace':'inherit'}}>{i.v}</span></div>)}
      </div>
      {/* Ações */}
      <div className="card" style={{marginBottom:10,overflow:'hidden',padding:0}}>
        {[{i:'🌙',l:dk?'Modo Claro':'Modo Escuro',a:()=>setDk(!dk)},{i:'✏️',l:'Editar perfil',a:()=>sEdit(true)},isG&&{i:'⚙️',l:'Configurações do sistema',a:()=>sCfg(true)}].filter(Boolean).map((x,ii,arr)=>(
          <button key={x.l} onClick={x.a} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'13px 15px',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',color:'var(--h1)',fontSize:13,fontWeight:500,textAlign:'left',borderBottom:ii<arr.length-1?'1px solid var(--br)':'none'}}>
            <div style={{width:34,height:34,borderRadius:10,background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16}}>{x.i}</div>
            {x.l}
            <svg style={{marginLeft:'auto'}} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--mu)" strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        ))}
      </div>
      <div className="card" style={{overflow:'hidden',padding:0}}>
        <button onClick={onLogout} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'14px 15px',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',color:'var(--rd)',fontSize:13,fontWeight:600,textAlign:'left'}}>
          <div style={{width:34,height:34,borderRadius:10,background:'var(--rdb)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16}}>🚪</div>
          Sair da conta
        </button>
      </div>
    </div>
    {showEdit&&<Modal title="Editar Perfil" close={()=>sEdit(false)}>
      <Fld label="Nome completo" val={fm.nome} set={v=>sFm(f=>({...f,nome:v}))}/>
      <Fld label="E-mail" val={fm.email} set={v=>sFm(f=>({...f,email:v}))} type="email"/>
      <button className="btn btn-blue" onClick={save}>✓ Salvar alterações</button>
    </Modal>}
    {showCfg&&isG&&<Modal title="⚙️ Configurações" sub="Personalizar o sistema" close={()=>sCfg(false)}>
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--mu)',textTransform:'uppercase',marginBottom:10}}>Hospital</div>
        <Fld label="Nome" val={cfg.hospital} set={v=>sCfg2(c=>({...c,hospital:v}))} ph="UPA Pediátrica JP"/>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--mu)',textTransform:'uppercase',marginBottom:10}}>GPS · Cerca virtual</div>
        <div className="row" style={{justifyContent:'space-between',marginBottom:6}}><span style={{fontSize:13,fontWeight:600,color:'var(--h1)'}}>Raio da cerca</span><span style={{fontSize:14,fontWeight:700,color:'var(--bl)'}}>{cfg.raio}m</span></div>
        <input type="range" min="20" max="200" step="10" value={cfg.raio} onChange={e=>sCfg2(c=>({...c,raio:+e.target.value}))} style={{width:'100%',accentColor:'var(--bl)'}}/>
        <div className="row" style={{justifyContent:'space-between',marginTop:3}}><span style={{fontSize:10,color:'var(--mu)'}}>20m (preciso)</span><span style={{fontSize:10,color:'var(--mu)'}}>200m (amplo)</span></div>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--mu)',textTransform:'uppercase',marginBottom:10}}>Valores dos plantões (R$)</div>
        <div className="grid2">
          <Fld label="Base (1–N)" val={String(cfg.v1)} set={v=>sCfg2(c=>({...c,v1:+v||825}))} type="number"/>
          <Fld label="Escalonado (N+)" val={String(cfg.v2)} set={v=>sCfg2(c=>({...c,v2:+v||1185}))} type="number"/>
        </div>
        <Fld label="A partir do plantão nº" val={String(cfg.lim)} set={v=>sCfg2(c=>({...c,lim:+v||6}))} type="number" hint="Ex: 6 = plantões 7+ ganham o valor escalonado"/>
      </div>
      <button className="btn btn-blue" onClick={saveCfg}>✓ Salvar configurações</button>
    </Modal>}
  </div>;
}

// ── NAV BAR ───────────────────────────
function Nav({tab,go,user,pendT,pendM}){
  const isG=user.role==='g';
  const IC={
    home:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    escala:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
    trocas:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>,
    msgs:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
    equipe:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
    perfil:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  };
  const tabs=isG
    ?[{id:'home',l:'Início'},{id:'escala',l:'Escala'},{id:'_mid',l:''},{id:'trocas',l:'Trocas',b:pendT},{id:'equipe',l:'Equipe'}]
    :[{id:'home',l:'Início'},{id:'escala',l:'Escala'},{id:'_mid',l:''},{id:'trocas',l:'Trocas',b:pendT},{id:'msgs',l:'Chat',b:pendM}];
  return<div className="nav-bar nav-safe">
    {tabs.map(t=>{
      if(t.id==='_mid')return<div key="_mid" style={{flex:1,display:'flex',justifyContent:'center',alignItems:'center'}}>
        <button onClick={()=>go(isG?'perfil':'perfil')} style={{width:52,height:52,borderRadius:'50%',background:'linear-gradient(135deg,var(--bl),var(--bld))',border:'none',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 20px rgba(21,101,192,.45),0 0 0 4px var(--bg)',marginBottom:10,transition:'transform .15s'}} onMouseOver={e=>e.currentTarget.style.transform='scale(1.08)'} onMouseOut={e=>e.currentTarget.style.transform='scale(1)'}>
          {IC.perfil&&React.cloneElement(IC.perfil,{stroke:'white',width:22,height:22})}
        </button>
      </div>;
      const isAct=tab===t.id;
      return<button key={t.id} onClick={()=>go(t.id)} className="nav-btn">
        <div style={{position:'relative',transition:'transform .15s',transform:isAct?'translateY(-1px)':'none',color:isAct?'var(--bl)':'var(--mu)'}}>
          {IC[t.id]&&React.cloneElement(IC[t.id],{stroke:isAct?'var(--bl)':'var(--mu)'})}
          {(t.b||0)>0&&<div style={{position:'absolute',top:-3,right:-4,width:14,height:14,borderRadius:'50%',background:'var(--rd)',display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:8,fontWeight:800,color:'#fff'}}>{t.b}</span></div>}
        </div>
        {t.l&&<span className="nav-label" style={{color:isAct?'var(--bl)':'var(--mu)'}}>{t.l}</span>}
        {isAct&&<div className="nav-dot"/>}
      </button>;
    })}
  </div>;
}

// ── APP ───────────────────────────────
function App(){
  const[state,sState]=useState('splash');const[user,sUser]=useState(null);const[tab,sTab]=useState('home');const[dk,sDk]=useState(false);
  const[shifts,setShifts,shOk]=useLS(K.SH,SH0);
  const[trocas,setTrocas,trOk]=useLS(K.TR,[]);
  const[msgs,setMsgs,msgOk]=useLS(K.MSG,[]);
  const[users,setUsers,usOk]=useLS(K.US,U0);
  const[log,setLog]=useLS(K.LG,[]);
  const ok=shOk&&trOk&&msgOk&&usOk;
  const{getP,setP}=usePhotos();
  const addLog=useCallback(e=>setLog(p=>[{...e,id:Date.now()},...(p||[])].slice(0,500)),[setLog]);
  const pendT=(trocas||[]).filter(t=>t.st==='pend'||t.st==='wait').length;
  const pendM=useMemo(()=>(!msgs||!user)?0:(msgs||[]).filter(m=>(m.para===user?.id||m.para==='all')&&m.de!==user?.id&&!m.lido?.[user?.id]).length,[msgs,user]);
  const isG=user?.role==='g';
  // Notif banners
  const[ns,sNs]=useState([]);const seen=useRef(new Set());
  useEffect(()=>{
    if(!user)return;const news=[];
    (trocas||[]).forEach(t=>{const k=`tr_${t.id}`;if(t.rec===user.id&&t.st==='pend'&&!seen.current.has(k)){news.push({id:k,tipo:'tr',msg:'Troca/repasse recebido',time:t.criado,color:'var(--pu)'});seen.current.add(k);}});
    (msgs||[]).filter(m=>(m.para===user.id||m.para==='all')&&m.de!==user.id&&!seen.current.has(`msg_${m.id}`)).forEach(m=>{news.push({id:`msg_${m.id}`,tipo:'msg',msg:m.urg?'🚨 Mensagem urgente':'💬 Nova mensagem',time:m.hora,color:m.urg?'var(--rd)':'var(--te)'});seen.current.add(`msg_${m.id}`);});
    if(news.length)sNs(p=>[...news,...p].slice(0,10));
  },[trocas,msgs,user?.id]);
  // Auto dark
  useAutoDark(sDk);
  useOnline(user?.id);
  // Alert gestor
  const[alertAtivo,sAlertAtivo]=useState(null);
  useEffect(()=>{if(!log||!user||isG)return;const last=(log||[]).filter(l=>l.tipo==='alert').sort((a,b)=>b.id-a.id)[0];if(last?.msg)sAlertAtivo(last.msg);},[log,user?.id]);
  // Dark mode CSS
  useEffect(()=>{_dk=dk;document.body.className=dk?'dark':'';document.body.style.background=dk?'#0A0F1E':'var(--bg)';},[dk]);
  const login=u=>{sUser(u);sState('main');sTab('home');};
  const logout=()=>{sUser(null);sState('login');sTab('home');};
  const shared={shifts,setShifts,trocas,setTrocas,ok,users,addLog,getP};
  const screens={
    home:isG?<HomeG {...shared} msgs={msgs} go={sTab} dk={dk} setDk={sDk} user={user}/>:<HomeP {...shared} user={user} go={sTab}/>,
    escala:<Escala {...shared} user={user}/>,
    trocas:<Trocas {...shared} user={user}/>,
    msgs:<Msgs user={user} msgs={msgs} setMsgs={setMsgs} users={users} getP={getP}/>,
    equipe:<Equipe user={user} shifts={shifts} users={users} setUsers={setUsers} getP={getP} setP={setP}/>,
    perfil:<Perfil user={user} shifts={shifts} users={users} setUsers={setUsers} dk={dk} setDk={sDk} onLogout={logout} getP={getP} setP={setP}/>,
  };
  return<div id="app">
    {ns.length>0&&state==='main'&&<NBanner n={ns[0]} dm={id=>sNs(p=>p.filter(n=>n.id!==id))}/>}
    {alertAtivo&&state==='main'&&<div style={{position:'fixed',top:56,left:10,right:10,zIndex:602,background:'linear-gradient(135deg,#DC2626,#B91C1C)',borderRadius:16,padding:'14px 16px',boxShadow:'0 8px 32px rgba(220,38,38,.4)',border:'2px solid #fca5a5',display:'flex',alignItems:'center',gap:12,animation:'dn .3s ease',fontFamily:'Inter,sans-serif'}}>
      <span style={{fontSize:24,flexShrink:0}}>🚨</span>
      <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:'#fff'}}>Aviso Urgente</div><div style={{fontSize:12,color:'rgba(255,255,255,.85)',marginTop:2,lineHeight:1.4}}>{alertAtivo}</div></div>
      <button onClick={()=>sAlertAtivo(null)} style={{background:'rgba(255,255,255,.2)',border:'none',borderRadius:10,padding:'6px 9px',cursor:'pointer',color:'#fff',fontSize:11,fontWeight:700}}>✕</button>
    </div>}
    {state==='main'&&user&&<>
      <div key={tab} style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',animation:'fi .18s ease'}}>{screens[tab]||screens.home}</div>
      <Nav tab={tab} go={sTab} user={user} pendT={pendT} pendM={pendM}/>
    </>}
    {state==='login'&&<Login onLogin={login} users={users?.length>0?users:U0}/>}
    {state==='splash'&&<Splash done={()=>sState('login')}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
