// Storage polyfill with localStorage + cross-tab sync
window.storage={
  _listeners:[],
  async get(k,s){try{const v=localStorage.getItem((s?\'sh_\':\'lo_\')+k);return v?{key:k,value:v,shared:!!s}:null;}catch{return null;}},
  async set(k,v,s){try{const key=(s?\'sh_\':\'lo_\')+k;localStorage.setItem(key,v);if(s){const e=new StorageEvent(\'storage\',{key,newValue:v});window.dispatchEvent(e);}return{key:k,value:v,shared:!!s};}catch{return null;}},
  async delete(k,s){try{localStorage.removeItem((s?\'sh_\':\'lo_\')+k);return{key:k,deleted:true};}catch{return null;}},
  async list(p,s){try{const pre=(s?\'sh_\':\'lo_\')+(p||\'\');const keys=Object.keys(localStorage).filter(k=>k.startsWith(pre)).map(k=>k.replace(s?\'sh_\':\'lo_\',\'\'));return{keys};}catch{return{keys:[]};}}
};

function useGeo(){

async function sSet(k,v){try{await window.storage.set(k,JSON.stringify(v),true);}catch{}}

function useShared(key,def,ms=3000){
  const[val,sV]=useState(def);const[ok,sOk]=useState(false);const last=useRef("");
  useEffect(()=>{(async()=>{const s=await sGet(key);if(s){sV(s);last.current=JSON.stringify(s);}else{await sSet(key,def);last.current=JSON.stringify(def);}sOk(true);})();},[]);
  useEffect(()=>{if(!ok)return;const i=setInterval(async()=>{const s=await sGet(key);if(s){const str=JSON.stringify(s);if(str!==last.current){sV(s);last.current=str;}}},ms);return()=>clearInterval(i);},[ok,ms]);
  const upd=useCallback(async(nv)=>{const r=typeof nv==="function"?nv(val):nv;sV(r);last.current=JSON.stringify(r);await sSet(key,r);},[key,val]);
  return[val,upd,ok];
}

// ── SALARY CALC PER USER (from shifts history) ────────────
function calcSalaryForUser(uid, allShifts) {
  // Get all concluded shifts for this user sorted by day
  const mine = Object.entries(allShifts)
    .flatMap(([day,ss])=>ss.map(s=>({...s,day:parseInt(day)})))
    .filter(s=>s.plantonistas.includes(uid)&&(s.status==="concluido"||s.status==="fechado_gestor"))
    .sort((a,b)=>a.day-b.day);
  
  let total = 0;
  const details = mine.map((s, idx) => {
    const num = idx + 1; // plantão número
    const valor = calcValorPlantao(num);
    total += valor;
    return { ...s, plantaoNum: num, valor };
  });
  return { details, total, count: mine.length };
}

// ── NOTIFICATIONS ──────────────────────────────────────────
function useNotifs(uid,trocas,msgs){
  const[ns,sNs]=useState([]);const seen=useRef(new Set());
  useEffect(()=>{
    if(uid===undefined||uid===null) return;
    const news=[];
    trocas.forEach(t=>{
      const kR=`t_${t.id}_pend`,kA=`t_${t.id}_ace`,kRe=`t_${t.id}_rec`;
      if(t.receptor===uid&&t.status==="pendente"&&!seen.current.has(kR)){news.push({id:kR,tipo:"troca",msg:`${getU(t.dono)?.nome.replace(/Dr\\. |Dra\\. /,"").split(" ")[0]} quer trocar plantão com você`,time:t.criadaEm,color:"#7c3aed"});seen.current.add(kR);}
      if(t.dono===uid&&t.status==="aceita"&&!seen.current.has(kA)){news.push({id:kA,tipo:"ok",msg:"Sua troca foi aceita ✓",time:t.resolvidaEm||"",color:"#16a34a"});seen.current.add(kA);}
      if(t.dono===uid&&t.status==="recusada"&&!seen.current.has(kRe)){news.push({id:kRe,tipo:"no",msg:"Sua troca foi recusada",time:t.resolvidaEm||"",color:"#dc2626"});seen.current.add(kRe);}
    });
    // Messages
    if(msgs){msgs.filter(m=>m.para===uid&&!seen.current.has(`msg_${m.id}`)).forEach(m=>{news.push({id:`msg_${m.id}`,tipo:"msg",msg:`📩 ${getU(m.de)?.nome.replace(/Dr\\. |Dra\\. /,"").split(" ")[0]}: ${m.texto.slice(0,40)}`,time:m.hora,color:"#0891b2"});seen.current.add(`msg_${m.id}`);});}
    if(news.length)sNs(p=>[...news,...p].slice(0,30));
  },[trocas,msgs,uid]);
  const dm=useCallback(id=>sNs(p=>p.filter(n=>n.id!==id)),[]);
  return{ns,dm};
}

  const Th=T();const[fmt,sFmt]=useState("whatsapp");const[cp,sCp]=useState(false);
  const build=()=>{
    const h=fmt==="whatsapp"?`📋 *ESCALA PEDIATRIA UPA JP*\n*${MONTHS[vm].toUpperCase()} / ${vy}*\n🏥 Dr. Rodrigo Cahuana Chipayo · CRM 11707\n${"─".repeat(30)}\n`:`ESCALA PEDIATRIA UPA JP — ${MONTHS[vm].toUpperCase()} ${vy}\n${"=".repeat(38)}\n`;

function Trocas({user,shifts,setShifts,trocas,setTrocas,ok}){

function NovaTroca({user,shifts,setTrocas,onClose}){
  const Th=T();const[tipo,sTipo]=useState("troca");const[dono,sDono]=useState(String(user.role==="plantonista"?user.id:""));const[rec,sRec]=useState("");const[shO,sSO]=useState("");const[shD,sSD]=useState("");const[motivo,sMot]=useState("");

  const all=Object.entries(shifts).flatMap(([day,ss])=>ss.map(s=>({...s,day:parseInt(day)})));
  const sOf=id=>all.filter(s=>s.plantonistas.includes(parseInt(id))&&s.status==="agendado");
  const fS=s=>{const d=new Date(2026,4,s.day);return`${String(s.day).padStart(2,"0")}/05 (${DSHORT[d.getDay()]}) · ${s.time}–${s.timeEnd}`;};
  const gD=id=>all.find(s=>s.id===parseInt(id))?.day;const ok2=dono&&rec&&shO&&(tipo==="repasse"||shD);

    {dono&&<Sel label="Turno a ceder" value={shO} onChange={e=>sSO(e.target.value)} options={[{v:"",l:"Selecionar turno…"},...sOf(dono).map(s=>({v:s.id,l:fS(s)}))]}/>}
    <Sel label={tipo==="troca"?"Quem recebe (e cede o dele)":"Quem assume"} value={rec} onChange={e=>sRec(e.target.value)} options={[{v:"",l:"Selecionar…"},...ps.filter(p=>String(p.id)!==String(dono)).map(p=>({v:p.id,l:p.nome}))]}/>

// ── MENSAGENS (chat interno) ──────────────────────────────
function Mensagens({user,msgs,setMsgs}){
  const Th=T();const isG=user.role==="gestor";
  const[dest,sDest]=useState(isG?"todos":"0");const[texto,sTexto]=useState("");const[destFilter,sDestFilter]=useState("todos");
  const ps=USERS.filter(u=>u.role==="plantonista");
  const filtered=useMemo(()=>{
    if(!msgs)return[];
    return msgs.filter(m=>{
      if(isG){if(destFilter==="todos")return true;return m.para===parseInt(destFilter)||m.de===parseInt(destFilter);}
      return(m.para===user.id||m.de===user.id||m.para==="todos");
    }).sort((a,b)=>b.id-a.id);
  },[msgs,isG,user.id,destFilter]);
  const enviar=async()=>{
    if(!texto.trim())return;const para=isG?(dest==="todos"?"todos":parseInt(dest)):0;
    const nova={id:Date.now(),de:user.id,para,texto:texto.trim(),hora:nowFull(),lida:false};
    await setMsgs(prev=>[nova,...(prev||[])].slice(0,200));sTexto("");
  };
  const getDestinatario=m=>{if(m.para==="todos")return"📢 Todos";const u=getU(typeof m.para==="number"?m.para:undefined);return u?u.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" "):"?";};
  return(<div style={{flex:1,display:"flex",flexDirection:"column",background:Th.bg,fontFamily:"'Nunito',sans-serif"}}>
    <div style={{padding:"44px 14px 13px",background:Th.gradH}}>

      <div style={{fontSize:16,fontWeight:900,color:"#fff",marginTop:1}}>💬 Mensagens</div>
      <div style={{fontSize:10,color:"rgba(255,255,255,.5)",marginTop:1}}>Chat interno da equipe</div>
      {isG&&<div style={{marginTop:10,overflowX:"auto",display:"flex",gap:6,paddingBottom:2}}>
        {["todos",...ps.map(p=>String(p.id))].map(d=>{const u=d==="todos"?null:getU(parseInt(d));return(
          <button key={d} onClick={()=>sDestFilter(d)} style={{flexShrink:0,padding:"5px 11px",borderRadius:20,border:"none",background:destFilter===d?"rgba(255,255,255,.25)":"rgba(255,255,255,.08)",color:destFilter===d?"#fff":"rgba(255,255,255,.5)",fontWeight:700,fontSize:10,fontFamily:"inherit",cursor:"pointer"}}>{u?u.nome.replace(/Dr\. |Dra\. /,"").split(" ")[0]:"📢 Todos"}</button>
        );})}
      </div>}
    </div>
    {/* Messages list */}
    <div style={{flex:1,overflowY:"auto",padding:"11px 12px",paddingBottom:80}}>
      {(!msgs||filtered.length===0)&&<div style={{textAlign:"center",padding:"32px 20px",color:Th.muted,fontSize:12}}><div style={{fontSize:28,marginBottom:8}}>💬</div><div style={{fontWeight:700,color:Th.body}}>Nenhuma mensagem ainda</div><div style={{fontSize:11,marginTop:4}}>Envie uma mensagem para a equipe</div></div>}
      {filtered.map(m=>{const isMine=m.de===user.id;const autor=getU(m.de);return(
        <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:isMine?"flex-end":"flex-start",marginBottom:10}}>
          {!isMine&&<div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><Av name={autor?.nome||"?"} size={18} ini={autor?.ini} color={autor?.color}/><span style={{fontSize:10,fontWeight:700,color:Th.body}}>{autor?.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" ")}</span></div>}
          <div style={{maxWidth:"80%",background:isMine?`${user.color}18`:Th.card,borderRadius:isMine?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"9px 12px",border:`1px solid ${isMine?user.color+"33":Th.border}`,boxShadow:Th.shadowCard}}>
            {m.para==="todos"&&!isMine&&<div style={{fontSize:8,fontWeight:700,color:Th.teal,marginBottom:3}}>📢 MENSAGEM PARA TODOS</div>}
            {m.para!=="todos"&&isG&&!isMine&&<div style={{fontSize:8,fontWeight:700,color:Th.purple,marginBottom:3}}>→ {getDestinatario(m)}</div>}
            <div style={{fontSize:12,color:isMine?user.color:Th.h1,lineHeight:1.5}}>{m.texto}</div>
            <div style={{fontSize:9,color:Th.muted,marginTop:4,textAlign:isMine?"right":"left"}}>{m.hora}</div>
          </div>
        </div>
      );})}
    </div>
    {/* Input */}
    <div style={{position:"fixed",bottom:60,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,padding:"10px 12px",background:Th.nav,borderTop:`1px solid ${Th.navBorder}`,zIndex:40}}>
      {isG&&<select value={dest} onChange={e=>sDest(e.target.value)} style={{width:"100%",padding:"7px 10px",borderRadius:9,border:`1px solid ${Th.inputBorder}`,outline:"none",fontSize:11,fontFamily:"'Nunito',sans-serif",color:Th.h1,background:Th.input,marginBottom:7,appearance:"none"}}>
        <option value="todos">📢 Enviar para todos</option>

      <div style={{display:"flex",gap:8}}>

        </button>
      </div>
    </div>
  </div>);}

      <div style={{background:Th.orangeBg,borderRadius:9,padding:"8px 11px",marginBottom:11,border:`1px solid ${Th.orange}44`,display:"flex",gap:6}}><span>⚠️</span><div style={{fontSize:10,color:"#92400e",lineHeight:1.4}}>Compartilhe apenas com o plantonista. Recomende alterar a senha.</div></div>
      <button onClick={()=>{navigator.clipboard?.writeText(`Plantão+ · Acesso\nLogin: ${cred.login}\nSenha: ${cred.senha}\nLink: ${window.location.href}`);}} style={{width:"100%",padding:"10px",background:Th.accentBg,border:`1.5px solid ${Th.accent}`,borderRadius:9,color:Th.accent,fontSize:11,fontWeight:700,fontFamily:"inherit",cursor:"pointer",marginBottom:7}}>📋 Copiar credenciais</button>
      <button onClick={()=>window.open(`https://wa.me/?text=${encodeURIComponent(`*Plantão+* · Acesso ao app\n\nOlá, ${cred.nome.replace(/Dr\. |Dra\. /,"").split(" ")[0]}!\n\n*Login:* ${cred.login}\n*Senha:* ${cred.senha}\n\nAcesse:\n${window.location.href}`)}`,"_blank")} style={{width:"100%",padding:"10px",background:"#25D366",border:"none",borderRadius:9,color:"#fff",fontSize:11,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>💬 Enviar pelo WhatsApp</button>
    </Modal>}
  </div>);}

// ── MAIS ──────────────────────────────────────────────────
function Mais({user,onLogout,darkMode,setDarkMode,shifts}){
  const Th=T();const isG=user.role==="gestor";
  const{count,total}=useMemo(()=>calcSalaryForUser(user.id,shifts),[shifts,user.id]);
  const nextVal=calcValorPlantao(count+1);
  return(<div style={{flex:1,overflowY:"auto",background:Th.bg,fontFamily:"'Nunito',sans-serif",paddingBottom:70}}>
    <div style={{padding:"46px 16px 22px",background:Th.gradH,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",width:200,height:200,borderRadius:"50%",background:`radial-gradient(circle,${user.color}25 0%,transparent 70%)`,top:-60,right:-40,pointerEvents:"none"}}/>
      <div style={{display:"flex",alignItems:"center",gap:13,marginBottom:13,position:"relative"}}><Av name={user.nome} size={54} ini={user.ini} color={user.color}/><div><div style={{fontSize:15,fontWeight:900,color:"#fff",letterSpacing:"-.3px"}}>{user.nome}</div><div style={{fontSize:10,color:"rgba(255,255,255,.55)",marginTop:2}}>CRM {user.crm} · {user.esp}</div><div style={{fontSize:9,color:"rgba(255,255,255,.4)"}}>{user.email}</div></div></div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap",position:"relative"}}>
        <div style={{display:"inline-flex",background:isG?"rgba(37,99,255,.3)":"rgba(22,163,74,.3)",borderRadius:20,padding:"4px 12px",alignItems:"center",gap:5}}><div style={{width:5,height:5,borderRadius:"50%",background:isG?"#93c5fd":"#86efac"}}/><span style={{fontSize:9,fontWeight:700,color:"#fff"}}>{isG?"GESTOR · ACESSO COMPLETO":"PLANTONISTA · PEDIATRIA"}</span></div>
        <div style={{display:"inline-flex",background:"rgba(74,222,128,.18)",borderRadius:20,padding:"4px 12px",alignItems:"center",gap:5}}><div style={{width:5,height:5,borderRadius:"50%",background:"#4ade80",animation:"pulse2 1.5s infinite"}}/><span style={{fontSize:9,fontWeight:700,color:"#4ade80"}}>TEMPO REAL</span></div>
      </div>
    </div>
    <div style={{padding:"12px 11px"}}>
      {/* Modo escuro */}
      <div style={{background:Th.card,borderRadius:13,padding:"13px 15px",marginBottom:11,boxShadow:Th.shadow,display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setDarkMode(!darkMode)}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:18}}>{darkMode?"☀️":"🌙"}</span><div><div style={{fontSize:13,fontWeight:700,color:Th.h1}}>{darkMode?"Modo Claro":"Modo Escuro"}</div><div style={{fontSize:10,color:Th.muted}}>Toque para alternar</div></div></div>
        <div style={{width:44,height:24,borderRadius:12,background:darkMode?Th.accent:Th.border,position:"relative",transition:"background .3s"}}><div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:darkMode?23:3,transition:"left .3s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/></div>
      </div>
      {/* Resumo financeiro */}
      {!isG&&count>0&&<div style={{background:Th.card,borderRadius:13,padding:"13px 15px",marginBottom:11,boxShadow:Th.shadow}}>
        <div style={{fontSize:10,fontWeight:700,color:Th.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:9}}>Resumo financeiro</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{background:Th.bg,borderRadius:9,padding:"9px 10px"}}><div style={{fontSize:9,color:Th.muted,marginBottom:3}}>Total ganho</div><div style={{fontSize:16,fontWeight:900,color:Th.green}}>{fmtR(total)}</div></div>
          <div style={{background:Th.bg,borderRadius:9,padding:"9px 10px"}}><div style={{fontSize:9,color:Th.muted,marginBottom:3}}>Próximo plantão</div><SalaryBadge num={count+1}/></div>
        </div>
      </div>}
      {/* Credenciais */}
      <div style={{background:Th.card,borderRadius:13,padding:"13px 15px",marginBottom:11,boxShadow:Th.shadow}}>
        <div style={{fontSize:9,fontWeight:700,color:Th.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Suas credenciais</div>
        {[{l:"Login",v:user.login},{l:"Senha",v:"••••••••"},{l:"E-mail",v:user.email}].map(item=>(<div key={item.l} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${Th.border}`}}><span style={{fontSize:11,color:Th.body,fontWeight:600}}>{item.l}</span><span style={{fontSize:11,fontWeight:700,color:Th.h1,fontFamily:"monospace"}}>{item.v}</span></div>))}
      </div>
      {/* Regra salarial */}
      <div style={{background:Th.card,borderRadius:13,padding:"13px 15px",marginBottom:11,boxShadow:Th.shadow}}>
        <div style={{fontSize:9,fontWeight:700,color:Th.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:9}}>Tabela de valores</div>
        {[{n:"Plantões 1 a 6",v:825,c:Th.green,bg:Th.greenBg},{n:"A partir do 7º",v:1185,c:Th.gold,bg:Th.goldBg}].map(r=>(<div key={r.n} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",background:r.bg,borderRadius:9,marginBottom:6,border:`1px solid ${r.c}22`}}><span style={{fontSize:11,fontWeight:600,color:r.c}}>{r.n}</span><span style={{fontSize:14,fontWeight:900,color:r.c}}>{fmtR(r.v)}</span></div>))}
      </div>
      {[{items:[{i:"👤",l:"Editar Perfil"},{i:"🔒",l:"Alterar Senha"},{i:"🔔",l:"Notificações"}]},...(isG?[{items:[{i:"🏥",l:"Configurar Hospital"},{i:"📍",l:"Cerca Virtual (50m)"},{i:"📋",l:"Relatórios"},{i:"💰",l:"Financeiro"}]}]:[]),{items:[{i:"🚪",l:"Sair da conta",red:true,action:onLogout}]}].map((g,gi)=>(
        <div key={gi} style={{background:Th.card,borderRadius:13,overflow:"hidden",boxShadow:Th.shadow,marginBottom:10}}>
          {g.items.map((item,ii)=>(<button key={item.l} onClick={item.action} style={{width:"100%",display:"flex",alignItems:"center",gap:11,padding:"13px 15px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",borderBottom:ii<g.items.length-1?`1px solid ${Th.border}`:"none",color:item.red?Th.red:Th.h1,fontSize:13,fontWeight:600,textAlign:"left"}} onMouseOver={e=>!item.red&&(e.currentTarget.style.background=Th.bg)} onMouseOut={e=>e.currentTarget.style.background="none"}>
            <span style={{fontSize:16}}>{item.i}</span>{item.l}
            {!item.red&&<svg style={{marginLeft:"auto"}} width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={Th.muted} strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>}
          </button>))}
        </div>
      ))}
    </div>
  </div>);}

// ── BOTTOM NAV ────────────────────────────────────────────
function Nav({active,setActive,user,pendT,pendMsg}){
  const Th=T();const isG=user.role==="gestor";
  const tabs=[
    {id:"home",l:"Início",ic:(c)=><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
    {id:"escala",l:"Escala",ic:(c)=><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
    {id:"_add",l:""},
    {id:"trocas",l:"Trocas",badge:pendT,ic:(c)=><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>},
    {id:isG?"financeiro":"msgs",l:isG?"Finanças":"Msgs",badge:isG?0:pendMsg,ic:(c)=>isG
      ?<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      :<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>},
  ];
  return(<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,height:60,background:Th.nav,borderTop:`1px solid ${Th.navBorder}`,display:"flex",alignItems:"center",boxShadow:"0 -4px 20px rgba(0,0,0,.1)",zIndex:50,fontFamily:"'Nunito',sans-serif"}}>
    {tabs.map(tab=>{
      if(tab.id==="_add")return(<div key="_add" style={{flex:1,display:"flex",justifyContent:"center",alignItems:"center"}}><button onClick={()=>setActive("escala")} style={{width:46,height:46,borderRadius:"50%",background:`linear-gradient(135deg,${Th.accent},${Th.accentDark})`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 16px ${Th.accent}44,0 0 0 4px ${Th.bg}`,marginBottom:9,transition:"transform .15s"}} onMouseOver={e=>e.currentTarget.style.transform="scale(1.1)"} onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>);
      const isAct=active===tab.id;
      return(<button key={tab.id} onClick={()=>setActive(tab.id)} style={{flex:1,height:"100%",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,fontFamily:"inherit",position:"relative"}}>
        <div style={{position:"relative",transition:"transform .15s",transform:isAct?"translateY(-1px)":"translateY(0)"}}>
          {tab.ic&&tab.ic(isAct?Th.accent:Th.muted)}
          {(tab.badge||0)>0&&<div style={{position:"absolute",top:-3,right:-4,width:14,height:14,borderRadius:"50%",background:Th.red,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 1px 4px ${Th.red}44`}}><span style={{fontSize:8,fontWeight:900,color:"#fff"}}>{tab.badge}</span></div>}
        </div>
        {tab.l&&<span style={{fontSize:9,fontWeight:isAct?800:500,color:isAct?Th.accent:Th.muted,letterSpacing:".01em"}}>{tab.l}</span>}
        {isAct&&<div style={{position:"absolute",bottom:0,width:20,height:3,borderRadius:"3px 3px 0 0",background:Th.accent}}/>}
      </button>);
    })}
  </div>);}

// ── APP ───────────────────────────────────────────────────
function App(){
  const[state,setState]=useState("splash");const[user,setUser]=useState(null);const[tab,setTab]=useState("home");
  const[darkMode,setDarkMode]=useState(false);
  const[shifts,setShifts,shiftsOk]=useShared(SK.SH,SHIFTS_DEFAULT);
  const[trocas,setTrocas,trocasOk]=useShared(SK.TR,[]);
  const[msgs,setMsgs,msgsOk]=useShared(SK.MSG,[]);
  const ok=shiftsOk&&trocasOk&&msgsOk;
  const{ns,dm}=useNotifs(user?.id,trocas,msgs);
  const pendT=trocas.filter(t=>t.status==="pendente").length;
  const pendMsg=useMemo(()=>(!msgs||!user)?0:msgs.filter(m=>(m.para===user.id||m.para==="todos")&&m.de!==user.id).length,[msgs,user]);
  const isG=user?.role==="gestor";

  useEffect(()=>{_dark=darkMode;document.body.className=darkMode?"dark":"";document.body.style.background=darkMode?"#070d1a":"#0d2870";},[darkMode]);

  const login=u=>{setUser(u);setState("main");setTab("home");};
  const logout=()=>{setUser(null);setState("login");setTab("home");};
  const props={user,shifts,setShifts,trocas,setTrocas,ok,setTab,darkMode,setDarkMode};

  const screens={
    home:isG?<HomeGestor {...props} msgs={msgs}/>:<HomePlant {...props}/>,
    escala:<Escala {...props}/>,
    trocas:<Trocas {...props}/>,
    financeiro:<Financeiro user={user||USERS[0]} shifts={shifts} setShifts={setShifts}/>,
    msgs:<Mensagens user={user||USERS[1]} msgs={msgs} setMsgs={setMsgs}/>,
    equipe:<Equipe user={user||USERS[0]} shifts={shifts}/>,
    mais:<Mais user={user||USERS[1]} onLogout={logout} darkMode={darkMode} setDarkMode={setDarkMode} shifts={shifts}/>,
  };

  return(<div style={{display:"flex",flexDirection:"column",height:"100dvh",overflow:"hidden",background:T().bg,position:"relative",maxWidth:430,margin:"0 auto",transition:"background .3s"}}>
    {state==="main"&&ns.length>0&&<NotifBanner n={ns[0]} dm={dm}/>}
    {state==="main"&&user&&<>{screens[tab]||screens.home}<Nav active={tab} setActive={setTab} user={user} pendT={pendT} pendMsg={pendMsg}/></>}
    {state==="login"&&<Login onLogin={login}/>}
    {state==="splash"&&<Splash onDone={()=>setState("login")}/>}
  </div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
