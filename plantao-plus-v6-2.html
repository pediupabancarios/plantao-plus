const S_BASE=825, S_PLUS=1185, S_LIM=6;
const calcVal=n=>n<=S_LIM?S_BASE:S_PLUS;
function calcSalary(uid,shifts){
  const mine=Object.entries(shifts)
    .flatMap(([d,ss])=>ss.map(s=>({...s,day:parseInt(d)})))
    .filter(s=>s.plantonistas.includes(uid)&&(s.status==="concluido"||s.status==="fechado_gestor"))
    .sort((a,b)=>a.day-b.day);
  let total=0;
  const items=mine.map((s,i)=>{const n=i+1,v=calcVal(n);total+=v;return{...s,num:n,valor:v};});
  return{items,total,count:mine.length,next:calcVal(mine.length+1),nextNum:mine.length+1};
}

// ── GEO ─────────────────────────────────────────────────
function distM(la1,lo1,la2,lo2){const R=6371000,r=x=>x*Math.PI/180;const a=Math.sin(r(la2-la1)/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(r(lo2-lo1)/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function useGeo(){
  const[g,sG]=useState({status:"idle",dist:null,ts:null});
  const check=useCallback(()=>{
    if(!navigator.geolocation){sG(x=>({...x,status:"erro"}));return;}
    sG(x=>({...x,status:"loading"}));
    navigator.geolocation.getCurrentPosition(
      p=>{const d=distM(p.coords.latitude,p.coords.longitude,HOSP.lat,HOSP.lng);sG({status:d<=RAIO?"dentro":"fora",dist:Math.round(d),acc:Math.round(p.coords.accuracy),ts:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})});},
      e=>{sG({status:e.code===1?"negado":"erro",dist:null,ts:null});},
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  },[]);
  return{geo:g,check};
}

// ── STORAGE HOOK ─────────────────────────────────────────
async function sGet(k){try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null;}catch{return null;}}
async function sSet(k,v){try{await window.storage.set(k,JSON.stringify(v),true);}catch{}}
function useShared(key,def,ms=2500){
  const[val,sV]=useState(def);const[ok,sOk]=useState(false);const last=useRef("");
  useEffect(()=>{(async()=>{const s=await sGet(key);if(s){sV(s);last.current=JSON.stringify(s);}else{await sSet(key,def);last.current=JSON.stringify(def);}sOk(true);})();},[]);
  useEffect(()=>{if(!ok)return;const i=setInterval(async()=>{const s=await sGet(key);if(s){const str=JSON.stringify(s);if(str!==last.current){sV(s);last.current=str;}}},ms);return()=>clearInterval(i);},[ok,ms]);
  const upd=useCallback(async(nv)=>{const r=typeof nv==="function"?nv(val):nv;sV(r);last.current=JSON.stringify(r);await sSet(key,r);},[key,val]);
  return[val,upd,ok];
}
// ── AUTO DARK MODE (19h-7h) ─────────────────────────────
function useAutoDark(setDarkMode){
  const applied=useRef(false);
  useEffect(()=>{
    if(applied.current)return;applied.current=true;
    const h=new Date().getHours();
    if(h>=19||h<7)setDarkMode(true);
  },[]);
}

// ── SOUND ────────────────────────────────────────────────
function playBeep(freq=523,dur=200){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;g.gain.setValueAtTime(.25,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur/1000);o.start();o.stop(ctx.currentTime+dur/1000);}catch(e){}
}

// ── SHIFT ALERT (1h antes) ───────────────────────────────
function useShiftAlert(user,shifts){
  const[alert,sAlert]=useState(null);const notified=useRef(new Set());
  useEffect(()=>{
    if(!user)return;
    const check=()=>{
      const now=new Date();
      const mine=Object.entries(shifts).flatMap(([d,ss])=>ss.map(s=>({...s,day:parseInt(d)}))).filter(s=>s.plantonistas.includes(user.id)&&s.status==="agendado");
      for(const s of mine){
        const[h,m]=s.time.split(":").map(Number);
        const start=new Date(2026,4,s.day,h,m,0);
        const diff=(start-now)/60000;
        const key=`${s.id}_60`;
        if(diff>55&&diff<=60&&!notified.current.has(key)){
          sAlert(s);notified.current.add(key);
          playBeep(523,300);setTimeout(()=>playBeep(659,300),350);setTimeout(()=>playBeep(784,400),700);
        }
      }
    };
    check();const i=setInterval(check,30000);return()=>clearInterval(i);
  },[user,shifts]);
  return{alert,clearAlert:()=>sAlert(null)};
}

// ── BIRTHDAY CHECK ───────────────────────────────────────
function useBirthdays(users){
  return useMemo(()=>{
    const today=new Date();const m=today.getMonth()+1,d=today.getDate();
    return(users||[]).filter(u=>{if(!u.nascimento)return false;const[,mm,dd]=u.nascimento.split("-").map(Number);return mm===m&&dd===d;});
  },[users]);
}

function useNotifs(uid,trocas,msgs){
  const[ns,sNs]=useState([]);const seen=useRef(new Set());
  useEffect(()=>{
    if(uid==null)return;
    const news=[];
    (trocas||[]).forEach(t=>{
      // Notificar receptor de nova troca/repasse (sem precisar do gestor)
      const kR=`tr_${t.id}_p`,kA=`tr_${t.id}_a`,kRe=`tr_${t.id}_r`;
      if(t.receptor===uid&&t.status==="pendente"&&!seen.current.has(kR)){
        news.push({id:kR,tipo:t.tipo==="repasse"?"repasse":"troca",msg:t.tipo==="repasse"?`Repasse recebido de ${t.donoNome||"colega"}`:`Troca solicitada por ${t.donoNome||"colega"}`,time:t.criadaEm,color:t.tipo==="repasse"?"#0891b2":"#7c3aed"});
        seen.current.add(kR);
      }
      if(t.dono===uid&&t.status==="aceita"&&!seen.current.has(kA)){news.push({id:kA,tipo:"ok",msg:"Sua solicitação foi aceita ✓",time:"",color:"#16a34a"});seen.current.add(kA);}
      if(t.dono===uid&&t.status==="recusada"&&!seen.current.has(kRe)){news.push({id:kRe,tipo:"no",msg:"Sua solicitação foi recusada",time:"",color:"#dc2626"});seen.current.add(kRe);}
    });
    (msgs||[]).filter(m=>(m.para===uid||m.para==="todos")&&m.de!==uid&&!seen.current.has(`msg_${m.id}`)).forEach(m=>{
      news.push({id:`msg_${m.id}`,tipo:"msg",msg:`💬 Nova mensagem`,time:m.hora,color:m.urgente?"#dc2626":"#0891b2"});
      seen.current.add(`msg_${m.id}`);
    });
    if(news.length)sNs(p=>[...news,...p].slice(0,20));
  },[trocas,msgs,uid]);
  return{ns,dm:useCallback(id=>sNs(p=>p.filter(n=>n.id!==id)),[])};
}

// Repasses: receptor aceita diretamente, sem precisar do gestor
function Trocas({user,shifts,setShifts,trocas,setTrocas,ok,users}){
  const Th=G();const allU=users||USERS_DEFAULT;
  const[tab,sTab]=useState("pendentes");const[nova,sNova]=useState(false);
  const isG=user.role==="gestor";
  const mine=isG?trocas:(trocas||[]).filter(t=>t.dono===user.id||t.receptor===user.id);
  const pend=mine.filter(t=>t.status==="pendente"),hist=mine.filter(t=>t.status!=="pendente");
  const list=tab==="pendentes"?pend:hist;
  const getS=id=>Object.values(shifts).flat().find(s=>s.id===id);
  const getU2=id=>allU.find(u=>u.id===id);

  // ── Aceitar: para repasse, o receptor aceita diretamente
  //            para troca, ainda precisa do gestor
  const aceitar=async(t)=>{
    const nv=JSON.parse(JSON.stringify(shifts));
    if(t.tipo==="repasse"){
      // Repasse: receptor aceita direto, escala atualiza para todos
      const s=nv[t.dayOrig]?.find(x=>x.id===t.shiftId);

  const all=Object.entries(shifts).flatMap(([day,ss])=>ss.map(s=>({...s,day:parseInt(day)})));
  const sOf=id=>all.filter(s=>s.plantonistas.includes(parseInt(id))&&s.status==="agendado");
  const fS=s=>{const d=new Date(2026,4,s.day);return`${String(s.day).padStart(2,"0")}/05 (${DS[d.getDay()]}) · ${s.time}–${s.timeEnd}`;};

    {id:"trocas",l:"Trocas",badge:pendT,ic:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>},
    {id:isG?"financeiro":"msgs",l:isG?"Finanças":"Msgs",badge:isG?0:pendMsg,ic:c=>isG?<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>:<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>},

      return<button key={tab.id} onClick={()=>setActive(tab.id)} style={{flex:1,height:"100%",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,fontFamily:"inherit",position:"relative"}}>
        <div style={{position:"relative",transition:"transform .15s",transform:isAct?"translateY(-1px)":"none"}}>{tab.ic&&tab.ic(isAct?Th.acc:Th.muted)}{(tab.badge||0)>0&&<div style={{position:"absolute",top:-3,right:-4,width:14,height:14,borderRadius:"50%",background:Th.red,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:8,fontWeight:900,color:"#fff"}}>{tab.badge}</span></div>}</div>

// ── APP ROOT ─────────────────────────────────────────────
function App(){
  const[state,setState]=useState("splash");const[user,sUser]=useState(null);const[tab,sTab]=useState("home");const[darkMode,sDark]=useState(false);
  useAutoDark(sDark);
  const[shifts,setShifts,shOk]=useShared(SK.SH,SH_DEF);
  const[trocas,setTrocas,trOk]=useShared(SK.TR,[]);
  const[msgs,setMsgs,msgOk]=useShared(SK.MSG,[]);
  const[users,setUsers,usOk]=useShared(SK.US,USERS_DEFAULT);
  const[log,setLog,lgOk]=useShared(SK.LG,[]);
  const ok=shOk&&trOk&&msgOk&&usOk;
  const{ns,dm}=useNotifs(user?.id,trocas,msgs);
  const{alert:shiftAlert,clearAlert}=useShiftAlert(user,shifts);
  const birthdays=useBirthdays(users);
  const pendT=(trocas||[]).filter(t=>t.status==="pendente"||t.status==="aguardando_gestor").length;
  const pendMsg=useMemo(()=>(!msgs||!user)?0:(msgs||[]).filter(m=>(m.para===user.id||m.para==="todos")&&m.de!==user.id).length,[msgs,user]);
  const[alertaAtivo,sAlertaAtivo]=useState(null);
  // Mostrar alertas urgentes do gestor
  useEffect(()=>{
    if(!log||!user||user.role==="gestor")return;
    const last=(log||[]).filter(l=>l.tipo==="alerta").sort((a,b)=>b.id-a.id)[0];
    if(last&&last.msg)sAlertaAtivo(last.msg);
  },[log]);
  const addLog=useCallback(async(e)=>setLog(prev=>[{...e,id:Date.now()},...(prev||[])].slice(0,500)),[setLog]);
  useEffect(()=>{_dk=darkMode;document.body.className=darkMode?"dark":"";document.body.style.background=darkMode?"#070d1a":"#0d2870";},[darkMode]);
  const login=u=>{sUser(u);setState("main");sTab("home");};
  const logout=()=>{sUser(null);setState("login");sTab("home");};
  const shared={user,shifts,setShifts,trocas,setTrocas,ok,setTab:sTab,darkMode,setDarkMode:sDark,users,addLog};
  const isG=user?.role==="gestor";
  const screens={
    home:isG?<HomeGestor {...shared} msgs={msgs}/>:<HomePlant {...shared}/>,
    escala:<Escala {...shared}/>,
    trocas:<Trocas {...shared}/>,
    financeiro:<Financeiro user={user||USERS_DEFAULT[0]} shifts={shifts} setShifts={setShifts} users={users}/>,
    msgs:<Mensagens user={user||USERS_DEFAULT[1]} msgs={msgs} setMsgs={setMsgs} users={users}/>,
    equipe:<Equipe user={user||USERS_DEFAULT[0]} shifts={shifts} users={users} setUsers={setUsers}/>,
    mais:<Mais user={user||USERS_DEFAULT[1]} onLogout={logout} darkMode={darkMode} setDarkMode={sDark} shifts={shifts}/>,
  };
  return<div style={{display:"flex",flexDirection:"column",height:"100dvh",overflow:"hidden",background:G().bg,width:"100%",transition:"background .3s"}}>
    {state==="main"&&ns.length>0&&<NotifBanner n={ns[0]} dm={dm}/>}
    {state==="main"&&alertaAtivo&&<AlertaBanner msg={alertaAtivo} onDismiss={()=>sAlertaAtivo(null)}/>}
    {state==="main"&&shiftAlert&&<ShiftAlertBanner shift={shiftAlert} users={users} onDismiss={clearAlert}/>}
    {state==="main"&&birthdays.length>0&&user?.role==="gestor"&&<div style={{position:"fixed",top:58,left:8,right:8,zIndex:599,background:"linear-gradient(135deg,#db2777,#9333ea)",borderRadius:16,padding:"12px 16px",boxShadow:"0 8px 28px rgba(219,39,119,.3)",display:"flex",alignItems:"center",gap:10,animation:"slideDown .3s ease",fontFamily:"'Nunito',sans-serif"}}><span style={{fontSize:22}}>🎂</span><div style={{flex:1}}><div style={{fontSize:12,fontWeight:800,color:"#fff"}}>Aniversário hoje!</div><div style={{fontSize:11,color:"rgba(255,255,255,.85)"}}>{birthdays.map(u=>u.nome.replace(/Dr\. |Dra\. /,"").split(" ").slice(0,2).join(" ")).join(", ")}</div></div><button onClick={()=>{}} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer",color:"#fff",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>🎉</button></div>}
    {state==="main"&&user&&<><div key={tab} style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",animation:"fadeIn .2s ease"}}>{screens[tab]||screens.home}</div><Nav active={tab} setActive={sTab} user={user} pendT={pendT} pendMsg={pendMsg}/></>}
    {state==="login"&&<Login onLogin={login} users={users&&users.length>0?users:USERS_DEFAULT}/>}
    {state==="splash"&&<Splash onDone={()=>setState("login")}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
